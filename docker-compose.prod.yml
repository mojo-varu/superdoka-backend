# Production overrides — VPS deployment
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:15-alpine
    container_name: superdoka_db
    restart: always
    environment:
      POSTGRES_PASSWORD: logbuk123
      POSTGRES_DB: logbuk_db
    volumes:
      - superdoka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logbuk_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: superdoka_redis
    restart: always
    volumes:
      - superdoka_redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superdoka_api
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./app/models:/app/models
      - ./static:/app/static
    env_file:
      - .env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["sh", "-c", "env -u PYTHONPATH alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info"]

volumes:
  superdoka_postgres_data:
  superdoka_redis_data:

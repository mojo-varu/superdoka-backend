/* Neobrutalism tokens — industrial palette */
:root {
  --nb-bg: #e8e4dc;
  --nb-bg-alt: #f1ede4;
  --nb-paper: #fafaf7;
  --nb-ink: #14171a;
  --nb-ink-soft: #2a2e33;
  --nb-muted: #6a6e73;

  --nb-border: 2px solid #14171a;
  --nb-border-thick: 3px solid #14171a;

  --nb-radius: 6px;
  --nb-radius-sm: 4px;

  --nb-shadow-sm: 3px 3px 0 0 #14171a;
  --nb-shadow: 5px 5px 0 0 #14171a;
  --nb-shadow-lg: 7px 7px 0 0 #14171a;

  --nb-lime: #d4c43a;
  --nb-yellow: #e8a93a;
  --nb-sky: #5b8aa8;
  --nb-coral: #b84a3a;
  --nb-violet: #6b6f8c;
  --nb-mint: #6b8e6e;
  --nb-pink: #b08770;
  --nb-orange: #c97a3a;

  --nb-good: #5a7a3a;
  --nb-warn: #c97a1a;
  --nb-bad: #a3331f;

  --nb-font: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  --nb-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--nb-font); color: var(--nb-ink); background: var(--nb-bg); -webkit-font-smoothing: antialiased; }

.nb-card { background: var(--nb-paper); border: var(--nb-border); border-radius: var(--nb-radius); box-shadow: var(--nb-shadow); }
.nb-flat { background: var(--nb-paper); border: var(--nb-border); border-radius: var(--nb-radius); }

.nb-btn {
  font-family: var(--nb-font); font-weight: 600; font-size: 12px; letter-spacing: 0.01em;
  background: var(--nb-paper); color: var(--nb-ink); border: var(--nb-border);
  border-radius: var(--nb-radius-sm); padding: 7px 12px; cursor: pointer;
  box-shadow: var(--nb-shadow-sm); transition: transform .06s ease, box-shadow .06s ease; white-space: nowrap;
}
.nb-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 #0a0a0a; }
.nb-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 #0a0a0a; }
.nb-btn.lime { background: var(--nb-lime); }
.nb-btn.sky { background: var(--nb-sky); color: #fafaf7; }
.nb-btn.coral { background: var(--nb-coral); color: #fafaf7; }
.nb-btn.yellow { background: var(--nb-yellow); }
.nb-btn.violet { background: var(--nb-violet); color: #fafaf7; }
.nb-btn.mint { background: var(--nb-mint); color: #fafaf7; }
.nb-btn.ink { background: var(--nb-ink); color: #fff; }

.nb-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--nb-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
  padding: 2px 7px; border: 1.5px solid var(--nb-ink); border-radius: 999px;
  background: var(--nb-paper); text-transform: lowercase;
}
.nb-tag.lime { background: var(--nb-lime); }
.nb-tag.sky { background: var(--nb-sky); color: #fafaf7; }
.nb-tag.coral { background: var(--nb-coral); color: #fafaf7; }
.nb-tag.yellow { background: var(--nb-yellow); }
.nb-tag.violet { background: var(--nb-violet); color: #fafaf7; }
.nb-tag.mint { background: var(--nb-mint); color: #fafaf7; }
.nb-tag.pink { background: var(--nb-pink); }
.nb-tag.ink { background: var(--nb-ink); color: #fff; border-color: var(--nb-ink); }

.nb-input {
  font-family: var(--nb-font); font-size: 13px; padding: 9px 12px;
  background: var(--nb-paper); border: var(--nb-border); border-radius: var(--nb-radius-sm);
  outline: none; color: var(--nb-ink); box-shadow: inset 2px 2px 0 0 rgba(0,0,0,0.04);
}
.nb-input:focus { box-shadow: var(--nb-shadow-sm); }

.nb-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.nb-scroll::-webkit-scrollbar-track { background: transparent; }
.nb-scroll::-webkit-scrollbar-thumb { background: var(--nb-ink); border: 2px solid var(--nb-bg); border-radius: 10px; }

.nb-label { font-family: var(--nb-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--nb-ink-soft); }

#app-root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header view-switch buttons */
.nb-view-btn {
  font-family: var(--nb-font); font-weight: 700; font-size: 12px; letter-spacing: 0.01em;
  padding: 7px 14px; border: 2px solid rgba(255,255,255,0.6); border-radius: var(--nb-radius-sm);
  cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
  transition: transform .06s ease, box-shadow .06s ease;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75);
  box-shadow: 3px 3px 0 0 rgba(255,255,255,0.2);
}
.nb-view-btn.active { background: var(--nb-yellow); color: var(--nb-ink); border-color: #fff; box-shadow: 3px 3px 0 0 rgba(255,255,255,0.5); }
.nb-view-btn:not(.active):hover { background: rgba(255,255,255,0.15); color: #fff; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 rgba(255,255,255,0.3); }
.nb-view-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 rgba(255,255,255,0.2); }

/* Language toggle */
.nb-lang-btn {
  font-family: var(--nb-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.08em;
  padding: 5px 10px; border: 2px solid rgba(255,255,255,0.5); border-radius: var(--nb-radius-sm);
  cursor: pointer; background: transparent; color: rgba(255,255,255,0.55);
  transition: all .1s; white-space: nowrap;
}
.nb-lang-btn.active { background: var(--nb-paper); color: var(--nb-ink); border-color: #fff; box-shadow: 2px 2px 0 0 rgba(255,255,255,0.4); }
.nb-lang-btn:not(.active):hover { background: rgba(255,255,255,0.12); color: #fff; }
</style>

function useLangT() {
  const { lang } = window.__useLang();
  const T = window.__T[lang];
  const t = (key, ...args) => { const v = T[key]; return typeof v === 'function' ? v(...args) : (v ?? key); };
  return { t, lang };
}

function StatusPill({ status }) {
  const map = {
    working: { bg:"#4e7d3a", label:"WORKING", light:true },
    warning: { bg:"var(--nb-yellow)", label:"WARNING" },
    idle:    { bg:"#e5e1d4", label:"IDLE" },
    down:    { bg:"var(--nb-coral)", label:"DOWN", light:true },
  };
  const s = map[status] || map.idle;
  return (
    <span style={{ fontFamily:"var(--nb-mono)", fontSize:10, fontWeight:800, padding:"3px 9px",
      background:s.bg, color:s.light ? "#fff" : "var(--nb-ink)",
      border:"2px solid var(--nb-ink)", borderRadius:4, letterSpacing:".06em" }}>{s.label}</span>
  );
}

function Avatar2({ initials, color, size=28 }) {
  return (
    <div style={{ width:size, height:size, borderRadius:"50%", background:color,
      border:"2px solid var(--nb-ink)", display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"var(--nb-mono)", fontWeight:700, fontSize:size*0.34, flexShrink:0, color:"var(--nb-ink)" }}>{initials}</div>
  );
}

function MetricBlock({ label, value, unit, sub, subTone, accent }) {
  const subColor = { good:"#0a7d2c", bad:"#a8201a", muted:"var(--nb-muted)" }[subTone || "muted"];
  return (
    <div style={{ padding:"16px 18px", background:accent||"var(--nb-paper)", borderRight:"2px solid var(--nb-ink)", flex:1, minWidth:0 }}>
      <div className="nb-label">{label}</div>
      <div style={{ display:"flex", alignItems:"baseline", gap:4, marginTop:6 }}>
        <span style={{ fontSize:30, fontWeight:800, lineHeight:1, letterSpacing:"-.02em" }}>{value}</span>
        {unit && <span style={{ fontFamily:"var(--nb-mono)", fontSize:13, fontWeight:600, color:"var(--nb-ink-soft)" }}>{unit}</span>}
      </div>
      {sub && <div style={{ fontFamily:"var(--nb-mono)", fontSize:10.5, fontWeight:600, color:subColor, marginTop:6, textTransform:"uppercase", letterSpacing:".05em" }}>{sub}</div>}
    </div>
  );
}

function classifyReply(text, T) {
  const t = text.toLowerCase();
  if (/начин|смен|start|shift/.test(t))
    return { tone:"ok", text:T.reply_shift_start, ext:{ intent:"shift_start", conf:"97%" } };
  if (/конч|закон|заверш|ended|finish/.test(t))
    return { tone:"ok", text:T.reply_shift_end, ext:{ intent:"shift_end", conf:"96%" } };
  if (/залил|топлив|солярк|заправ|fuel|litr/.test(t)) {
    const n = t.match(/\d+/); const v = n ? n[0] : "?";
    return { tone:"ok", text:T.reply_fuel(v), ext:{ intent:"fuel_log", fields:`vol: ${v}`, conf:"93%" } };
  }
  if (/наработ|часов|hours|engine/.test(t)) {
    const n = t.match(/\d+/); const h = n ? n[0] : "?";
    return { tone:"ok", text:T.reply_hours(h), ext:{ intent:"hours_log", fields:`hours: ${h}`, conf:"94%" } };
  }
  if (/пожар|горит|fire/.test(t))
    return { tone:"bad", text:T.reply_critical, ext:{ intent:"issue_report", fields:"severity: critical", conf:"97%" } };
  if (/стучит|течь|масло|гидравл|неисправ|сломал|проблем|knock|leak|hydraul/.test(t))
    return { tone:"warn", text:T.reply_issue, ext:{ intent:"issue_report", fields:"severity: warning", conf:"87%" } };
  if (/куб|рейс|тонн|вывезли|cubic|moved/.test(t)) {
    const n = t.match(/\d+/);
    return { tone:"ok", text:T.reply_production, ext:{ intent:"production_log", fields:n?`qty: ${n[0]}`:"qty: ?", conf:"90%" } };
  }
  if (/запчаст|фильтр|нужн|замен|filter|need|part/.test(t))
    return { tone:"ok", text:T.reply_parts, ext:{ intent:"parts_request", fields:"logged", conf:"89%" } };
  return { tone:"ok", text:T.reply_default, ext:{ intent:"status_update", conf:"82%" } };
}

function OperatorSandbox() {
  const { t, lang } = useLangT2();
  const [opData, setOpData] = React.useState(() => JSON.parse(JSON.stringify(OPS_DATA)));
  const [currentId, setCurrentId] = React.useState("petr");
  const [draft, setDraft] = React.useState("");
  const [apiLoading, setApiLoading] = React.useState(false);
  const msgsRef = React.useRef(null);
  const op = opData[currentId];

  React.useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [op.history.length, currentId, apiLoading]);

  const TL = window.__T[lang];

  const _applyReply = (opId, text, replyBubble) => {
    setOpData(prev => {
      const next = { ...prev };
      const o = { ...next[opId] };
      o.history = [...o.history, replyBubble];
      if (/начин|смен|start|shift/.test(text.toLowerCase())) o.shiftOn = true;
      if (/конч|закон|заверш|ended|finish/.test(text.toLowerCase())) o.shiftOn = false;
      next[opId] = o;
      return next;
    });
  };

  const send = async (textArg) => {
    const text = (textArg ?? draft).trim();
    if (!text || apiLoading) return;
    const now = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
    const snapId = currentId;
    setDraft("");

    setOpData(prev => {
      const next = { ...prev };
      const o = { ...next[snapId] };
      o.history = [...o.history, { from:"op", textRu:text, textEn:text, ts:now }];
      next[snapId] = o;
      return next;
    });

    const opEntry = opData[snapId];
    if (opEntry.tg_id) {
      setApiLoading(true);
      try {
        const res = await fetch('/api/v1/vfm/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            operator_tg_id: opEntry.tg_id,
            chat_id: 'sandbox',
            text,
            source: 'rest',
            modality: 'text',
          }),
        });
        const data = await res.json();
        const replyTs = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
        const tone = (data.errors && data.errors.length > 0) ? 'warn'
          : data.intent === 'issue_report' ? 'warn'
          : data.confidence_route === 'CONFIRM' ? 'warn'
          : 'ok';
        const confPct = data.confidence != null ? `${Math.round(data.confidence * 100)}%` : '—';
        _applyReply(snapId, text, {
          from: 'sys', tone,
          textRu: data.reply || TL.reply_default,
          textEn:  data.reply || TL.reply_default,
          ts: replyTs,
          ext: { intent: data.intent || 'unknown', conf: confPct },
        });
      } catch (_err) {
        const fallback = classifyReply(text, TL);
        const replyTs = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
        _applyReply(snapId, text, { from:'sys', tone:fallback.tone, textRu:fallback.text, textEn:fallback.text, ts:replyTs, ext:fallback.ext });
      } finally {
        setApiLoading(false);
      }
    } else {
      setTimeout(() => {
        const reply = classifyReply(text, TL);
        const replyTs = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
        _applyReply(snapId, text, { from:'sys', tone:reply.tone, textRu:reply.text, textEn:reply.text, ts:replyTs, ext:reply.ext });
      }, 550);
    }
  };

  const switchMachine = reg => {
    setOpData(prev => {
      const next = { ...prev };
      const o = { ...next[currentId] };
      o.activeMachine = reg;
      o.machines = o.machines.map(m => ({ ...m, active:m.reg === reg }));
      const now = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
      const switchText = TL.reply_switch(reg);
      o.history = [...o.history, { from:"sys", tone:"ok", textRu:switchText, textEn:switchText, ts:now, ext:{ intent:"machine_switch", fields:reg, conf:"99%" } }];
      next[currentId] = o;
      return next;
    });
  };

  const toggleShift = () => {
    if (!op.shiftOn) send(TL.shift_start_msg(op.machines[0].reg));
    else send(TL.shift_end_msg);
  };

  const quick = [
    { labelKey:"ql_fuel",  textKey:"qt_fuel",  color:"var(--nb-paper)" },
    { labelKey:"ql_hours", textKey:"qt_hours", color:"var(--nb-paper)" },
    { labelKey:"ql_issue", textKey:"qt_issue", color:"var(--nb-coral)", textLight:true },
    { labelKey:"ql_prod",  textKey:"qt_prod",  color:"var(--nb-paper)" },
    { labelKey:"ql_parts", textKey:"qt_parts", color:"var(--nb-paper)" },
  ];

  const opName = lang === 'ru' ? op.nameRu : op.nameEn;
  const opRole = lang === 'ru' ? op.roleRu : op.roleEn;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      <div style={{ display:"grid", gridTemplateColumns:"260px 1fr", flex:1, minHeight:0 }}>
        {/* Operator list */}
        <div style={{ background:"var(--nb-bg-alt)", borderRight:"var(--nb-border-thick)", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div style={{ padding:"12px 14px 10px", borderBottom:"2px solid var(--nb-ink)", background:"var(--nb-yellow)" }}>
            <div className="nb-label">{t('ops_header')}</div>
            <div style={{ fontWeight:700, fontSize:18, marginTop:2 }}>{t('ops_count')}</div>
          </div>
          <div className="nb-scroll" style={{ overflowY:"auto", flex:1 }}>
            {Object.entries(opData).map(([id, o]) => (
              <OperatorChip key={id} op={o} active={id===currentId} onClick={() => setCurrentId(id)} lang={lang} />
            ))}
          </div>
          <div style={{ padding:"10px 12px", borderTop:"2px solid var(--nb-ink)", background:"var(--nb-paper)", fontFamily:"var(--nb-mono)", fontSize:10, color:"var(--nb-muted)", lineHeight:1.5 }}>
            <div style={{ fontWeight:700, color:"var(--nb-ink)", marginBottom:2 }}>{t('sandbox_mode')}</div>
            {t('sandbox_hint')}
          </div>
        </div>

        {/* Chat panel */}
        <div style={{ display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>
          <div style={{ padding:"14px 18px", borderBottom:"var(--nb-border-thick)", background:"var(--nb-paper)", display:"flex", flexDirection:"column", gap:10, flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <Avatar initials={op.av} color={op.color} size={42} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:18, fontWeight:700, lineHeight:1.1 }}>{opName}</div>
                <div style={{ fontFamily:"var(--nb-mono)", fontSize:11, color:"var(--nb-muted)", marginTop:2, textTransform:"uppercase", letterSpacing:".06em" }}>
                  {opRole} · {op.shiftOn ? t('on_shift') : t('off_shift')}
                </div>
              </div>
              <button className={`nb-btn ${op.shiftOn ? "coral" : "yellow"}`} onClick={toggleShift}>
                {op.shiftOn ? t('btn_end_shift') : t('btn_start_shift')}
              </button>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
              <span className="nb-label">{t('machines_label')}</span>
              {op.machines.map(m => <MachinePill key={m.reg} m={m} onClick={() => switchMachine(m.reg)} />)}
            </div>
          </div>

          <div style={{ padding:"10px 18px", borderBottom:"2px solid var(--nb-ink)", background:"var(--nb-bg-alt)", display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", flexShrink:0 }}>
            <span className="nb-label" style={{ marginRight:4 }}>{t('quick_log_label')}</span>
            {quick.map(q => (
              <button key={q.labelKey} className="nb-btn" style={{ background:q.color, color:q.textLight?"#fafaf7":"var(--nb-ink)" }} onClick={() => send(t(q.textKey))}>
                {t(q.labelKey)}
              </button>
            ))}
          </div>

          <div ref={msgsRef} className="nb-scroll" style={{
            flex:1, overflowY:"auto", padding:"18px 18px 8px", display:"flex", flexDirection:"column", gap:14,
            background:`repeating-linear-gradient(0deg, var(--nb-bg) 0 28px, var(--nb-bg) 28px 29px, rgba(10,10,10,0.04) 29px 30px)`,
          }}>
            {op.history.length === 0 ? (
              <div style={{ margin:"auto", textAlign:"center", background:"var(--nb-paper)", border:"var(--nb-border)", borderRadius:8, padding:"20px 28px", boxShadow:"var(--nb-shadow)" }}>
                <div style={{ fontSize:28, fontWeight:800 }}>{t('no_msgs_title')}</div>
                <div style={{ fontFamily:"var(--nb-mono)", fontSize:11, color:"var(--nb-muted)", marginTop:6 }}>{t('no_msgs_hint')}</div>
              </div>
            ) : op.history.map((msg, i) => <Bubble key={i} msg={msg} opColor={"var(--nb-bg-alt)"} lang={lang} />)}
            {apiLoading && (
              <div style={{ alignSelf:"flex-start", maxWidth:"82%" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                  <div style={{ width:22, height:22, borderRadius:"50%", background:"var(--nb-ink)", color:"#fff",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontFamily:"var(--nb-mono)", fontSize:9, fontWeight:700, border:"2px solid var(--nb-ink)" }}>VFM</div>
                </div>
                <div style={{ background:"var(--nb-paper)", border:"2px solid var(--nb-ink)", borderRadius:"4px 12px 12px 12px",
                  padding:"10px 16px", boxShadow:"3px 3px 0 0 var(--nb-ink)", fontFamily:"var(--nb-mono)", fontSize:12, letterSpacing:".04em",
                  display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ animation:"none", opacity:.7 }}>▪ ▪ ▪</span>
                </div>
              </div>
            )}
          </div>

          <div style={{ padding:"12px 18px", borderTop:"var(--nb-border-thick)", background:"var(--nb-paper)", display:"flex", gap:10, flexShrink:0 }}>
            <input className="nb-input" style={{ flex:1, opacity:apiLoading?.5:1 }}
              placeholder={t('input_placeholder', opName.split(" ")[0])}
              value={draft} onChange={e => setDraft(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !apiLoading) send(); }}
              disabled={apiLoading} />
            <button className="nb-btn ink" onClick={() => send()} disabled={apiLoading}
              style={{ opacity:apiLoading?.5:1 }}>{t('btn_send')}</button>
          </div>
        </div>
      </div>

  );
}

            { id:"operator", labelKey:"view_operator", icon:"◎" },
          ].map(vt => (
            <button key={vt.id} className={`nb-view-btn${view === vt.id ? " active" : ""}`} onClick={() => setView(vt.id)}>
              <span style={{ fontSize:14 }}>{vt.icon}</span>
              {T[vt.labelKey]}
            </button>
          ))}

          {/* Right side */}
          <div style={{ marginLeft:"auto", display:"flex", gap:10, alignItems:"center" }}>

            {/* Language toggle */}
            <div style={{ display:"flex", gap:2, background:"rgba(255,255,255,0.08)", border:"2px solid rgba(255,255,255,0.25)", borderRadius:4, padding:2 }}>
              <button className={`nb-lang-btn${lang === 'ru' ? " active" : ""}`} onClick={() => setLang('ru')}>RU</button>
              <button className={`nb-lang-btn${lang === 'en' ? " active" : ""}`} onClick={() => setLang('en')}>EN</button>
            </div>

            {/* Status badges */}
            <span style={{ fontFamily:"var(--nb-mono)", fontSize:10, fontWeight:600, padding:"3px 10px",
              border:"2px solid #fff", borderRadius:4, background:"var(--nb-coral)",
              letterSpacing:".04em", boxShadow:"2px 2px 0 0 rgba(255,255,255,0.3)" }}>{T.open_issue_badge}</span>
            <span style={{ fontFamily:"var(--nb-mono)", fontSize:10, fontWeight:600, padding:"3px 10px",
              border:"2px solid #fff", borderRadius:4, background:"var(--nb-lime)", color:"var(--nb-ink)",
              letterSpacing:".04em", boxShadow:"2px 2px 0 0 rgba(255,255,255,0.3)" }}>{T.shifts_active_badge}</span>

            {/* Owner avatar */}
            <div style={{ width:32, height:32, borderRadius:"50%", background:"var(--nb-paper)", border:"2px solid #fff",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontFamily:"var(--nb-mono)", fontWeight:700, fontSize:10, color:"var(--nb-ink)",
              boxShadow:"2px 2px 0 0 rgba(255,255,255,0.3)" }}>ОВ</div>
          </div>
        </div>

        {/* Content */}
        <div style={{ flex:1, overflow:"hidden", position:"relative" }}>
          <div style={{ position:"absolute", inset:0, display:view==="owner"?"flex":"none", flexDirection:"column", overflow:"hidden" }}>
            <FleetIntelligence />
          </div>
          <div style={{ position:"absolute", inset:0, display:view==="operator"?"flex":"none", flexDirection:"column", overflow:"hidden" }}>
            <OperatorSandbox />
          </div>
        </div>
      </div>
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App />);
  </script>
</body>
</html>

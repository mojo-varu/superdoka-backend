
<style>
*{box-sizing:border-box;margin:0;padding:0}
.screen{display:grid;grid-template-columns:220px 1fr;height:720px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-tertiary);font-family:var(--font-sans,system-ui)}
.topbar{grid-column:1/-1;height:44px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 16px;gap:12px;font-size:13px}
.topbar-title{font-weight:500;color:var(--color-text-primary)}
.topbar-sub{font-size:12px;color:var(--color-text-tertiary)}
.screen-grid{grid-column:1/-1;display:grid;grid-template-columns:220px 1fr;height:calc(720px - 44px)}
.left{background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden}
.section-label{font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--color-text-tertiary);text-transform:uppercase;padding:12px 14px 6px}
.op-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--color-border-tertiary);transition:background .1s}
.op-item:hover{background:var(--color-background-secondary)}
.op-item.active{background:#E6F1FB;border-left:2px solid #185FA5}
.op-item.active .op-name{color:#0C447C}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.av-a{background:#E6F1FB;color:#0C447C}
.av-b{background:#FAEEDA;color:#633806}
.av-c{background:#E1F5EE;color:#085041}
.av-d{background:#EEEDFE;color:#3C3489}
.op-info{flex:1;min-width:0}
.op-name{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:1px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-on{background:#639922}
.dot-off{background:#B4B2A9}
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--color-background-primary)}
.chat-topbar{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.chat-op-row{display:flex;align-items:center;gap:10px}
.chat-op-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.chat-op-role{font-size:12px;color:var(--color-text-tertiary)}
.machine-pills{display:flex;gap:6px;flex-wrap:wrap}
.mpill{font-size:11px;padding:3px 10px;border-radius:4px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:var(--color-background-secondary);cursor:pointer;transition:all .15s}
.mpill:hover{background:var(--color-background-primary);border-color:var(--color-border-primary)}
.mpill.active{background:#E6F1FB;border-color:#185FA5;color:#0C447C;font-weight:500}
.mpill.warn{background:#FAEEDA;border-color:#BA7517;color:#633806}
.action-bar{display:flex;gap:6px;padding:8px 16px;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0;flex-wrap:wrap}
.act-btn{font-size:11px;padding:4px 10px;border-radius:4px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:var(--color-background-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.act-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.act-btn.primary{background:#E6F1FB;border-color:#185FA5;color:#0C447C}
.act-btn.danger{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.bubble{padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;max-width:85%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.bubble.op{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);align-self:flex-end;color:var(--color-text-primary)}
.bubble.sys{background:#EAF3DE;border:0.5px solid #97C459;align-self:flex-start;color:#27500A;font-size:12px}
.bubble.sys.w{background:#FAEEDA;border-color:#EF9F27;color:#633806}
.bubble.sys.e{background:#FCEBEB;border-color:#F09595;color:#791F1F}
.extracted{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.ep{font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(0,0,0,.05);color:inherit;border:0.5px solid currentColor;opacity:.7}
.ts{font-size:10px;color:var(--color-text-tertiary);margin-top:3px;display:block}
.input-row{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;flex-shrink:0}
.msg-input{flex:1;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--color-text-primary);outline:none;font-family:inherit}
.msg-input:focus{border-color:var(--color-border-secondary)}
.send-btn{background:#E6F1FB;border:0.5px solid #185FA5;color:#0C447C;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.send-btn:hover{background:#B5D4F4}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--color-text-tertiary)}
</style>

<div class="screen">
  <div style="grid-column:1/-1;height:44px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 16px;gap:12px">
    <span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">Logbuk</span>
    <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-tertiary)">Operator console</span>
    <span id="active-count" style="margin-left:auto;font-size:12px;color:var(--color-text-tertiary)">Loading…</span>
  </div>
  <div class="screen-grid">

    <div class="left" id="op-list">
      <div style="padding:14px;font-size:12px;color:var(--color-text-tertiary)">Loading operators…</div>
    </div>

    <div class="right" id="right-panel">
      <div class="chat-topbar" id="chat-topbar"></div>
      <div class="action-bar" id="action-bar"></div>
      <div class="msgs" id="msgs"></div>
      <div class="input-row">
        <input class="msg-input" id="msg-input" placeholder="Type as operator..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:8000/api/v1';
const AV_CLASSES = ['av-a','av-b','av-c','av-d'];

let operators = [];
let opHistory = {};
let opShiftState = {};
let timelineLoaded = {};
let currentOpId = null;

async function init() {
  try {
    operators = await fetch(`${API}/operator/list`).then(r => r.json());
  } catch(e) {
    document.getElementById('op-list').innerHTML = '<div style="padding:14px;font-size:12px;color:var(--color-text-tertiary)">Failed to load operators</div>';
    return;
  }
  operators.forEach(op => {
    opHistory[op.id] = [];
    opShiftState[op.id] = { shiftOn: op.is_on_shift, activeMachine: op.active_machine };
  });
  const active = operators.filter(o => o.is_on_shift).length;
  document.getElementById('active-count').textContent = `${active} of ${operators.length} active`;
  renderLeft();
  if (operators.length > 0) {
    currentOpId = operators[0].id;
    document.querySelector('#op-list .op-item')?.classList.add('active');
    await loadAndRenderRight(currentOpId);
  }
}

function renderLeft() {
  const html = `<div class="section-label">Operators</div>` + operators.map((op, i) => {
    const avClass = AV_CLASSES[i % AV_CLASSES.length];
    const meta = op.machines.map(m => m.reg_number).join(' · ') || 'No machines';
    const dot = opShiftState[op.id]?.shiftOn ? 'dot-on' : 'dot-off';
    const active = op.id === currentOpId ? ' active' : '';
    return `<div class="op-item${active}" onclick="selectOp(${op.id},this)">
      <div class="av ${avClass}">${op.initials}</div>
      <div class="op-info"><div class="op-name">${op.name}</div><div class="op-meta">${meta}</div></div>
      <div class="status-dot ${dot}"></div>
    </div>`;
  }).join('');
  document.getElementById('op-list').innerHTML = html;
}

async function selectOp(opId, el) {
  currentOpId = opId;
  document.querySelectorAll('.op-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  await loadAndRenderRight(opId);
}

async function loadAndRenderRight(opId) {
  if (!timelineLoaded[opId]) {
    try {
      const events = await fetch(`${API}/operator/${opId}/timeline`).then(r => r.json());
      const history = [];
      events.forEach(e => {
        if (e.raw_text) history.push({ from:'op', text:e.raw_text, ts:e.time, extracted:null });
        history.push(eventToSysReply(e));
      });
      opHistory[opId] = history;
      timelineLoaded[opId] = true;
    } catch(err) { console.error('Timeline fetch failed:', err); }
  }
  renderRight(opId);
}

function eventToSysReply(e) {
  const c = e.content || {};
  const conf = e.confidence ? `${Math.round(e.confidence*100)}%` : '?';
  const ext = { Intent: e.event_type, Confidence: conf };
  let text, cls = 'sys';
  switch(e.event_type) {
    case 'shift_start':    text=`Смена открыта. Машина ${e.machine_reg} активна. Удачной смены!`; ext.Machine=e.machine_reg; break;
    case 'shift_end':      text='Смена закрыта. Итоги рассчитаны.'; break;
    case 'fuel_log':       text=`Записано: ${c.fuel_volume||'?'}${c.unit||'л'} топлива ✓`; ext.Volume=`${c.fuel_volume||'?'}${c.unit||'л'}`; if(c.inferred)ext.Context='inferred'; break;
    case 'hours_log':      text=`Записано: ${c.hours||'?'}${c.unit||'ч'} наработки ✓`; ext.Hours=`${c.hours||'?'}${c.unit||'ч'}`; break;
    case 'issue_report': { const sev=(c.severity||'medium').toLowerCase(); text=`Зафиксировано: ${c.component||'неисправность'}, ${sev.toUpperCase()}. Уведомлён.`; cls=sev==='critical'?'sys e':'sys w'; ext.Component=c.component||''; ext.Severity=sev; break; }
    case 'parts_request':  text=`Запрос зафиксирован: ${c.part||'?'}, ${e.machine_reg}.`; ext.Part=c.part||''; break;
    case 'production_log': text=`Выработка записана: ${c.qty||'?'} ${c.unit||''} ✓`; ext.Qty=c.qty||''; break;
    case 'status_update':  text='Записано. Рекомендую уточнить детали.'; break;
    default: text='Принято ✓';
  }
  return { from:'sys', text, ts:e.time, cls, extracted:ext };
}

function renderRight(opId) {
  const idx = operators.findIndex(o => o.id === opId);
  const op = operators[idx];
  if (!op) return;
  const avClass = AV_CLASSES[idx % AV_CLASSES.length];
  const state = opShiftState[opId] || {};
  const history = opHistory[opId] || [];
  const tb = document.getElementById('chat-topbar');
  const ab = document.getElementById('action-bar');
  const ms = document.getElementById('msgs');

  const pillsHtml = op.machines.map(m => {
    const isActive = m.reg_number === state.activeMachine;
    const cls = isActive ? (m.status==='warning'?'mpill warn':'mpill active') : 'mpill';
    return `<span class="${cls}" onclick="switchMachine('${m.reg_number}',this,${opId})">${m.reg_number}</span>`;
  }).join('');

  tb.innerHTML = `
    <div class="chat-op-row">
      <div class="av ${avClass}" style="width:36px;height:36px;font-size:12px">${op.initials}</div>
      <div><div class="chat-op-name">${op.name}</div><div class="chat-op-role">Operator</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:var(--color-text-tertiary)">Assigned machines:</span>
      <div class="machine-pills">${pillsHtml}</div>
    </div>`;

  ab.innerHTML = `
    ${state.shiftOn?`<button class="act-btn danger" onclick="toggleShift()">End shift</button>`:`<button class="act-btn primary" onclick="toggleShift()">Start shift</button>`}
    <button class="act-btn" onclick="quickSend('Залил 50 литров')">+ Fuel</button>
    <button class="act-btn" onclick="quickSend('Наработка 4 часа')">+ Hours</button>
    <button class="act-btn" onclick="quickSend('Обнаружена неисправность')">+ Issue</button>
    <button class="act-btn" onclick="quickSend('Вывезли 15 кубов')">+ Production</button>
    <button class="act-btn" onclick="quickSend('Нужна запчасть')">+ Parts</button>`;

  ms.innerHTML = history.length === 0
    ? `<div class="empty-state">No messages yet — start a shift to begin</div>`
    : history.map(h => renderBubble(h)).join('');
  ms.scrollTop = ms.scrollHeight;
}

function renderBubble(h) {
  const cls = h.from==='op' ? 'op' : h.cls||'sys';
  const ext = h.extracted ? `<div class="extracted">${Object.entries(h.extracted).map(([,v])=>`<span class="ep">${v}</span>`).join('')}</div>` : '';
  return `<div class="bubble ${cls}"><span class="ts">${h.ts}</span>${h.text}${ext}</div>`;
}

function quickSend(text) { document.getElementById('msg-input').value=text; sendMsg(); }

function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentOpId) return;
  input.value = '';
  const now = new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  opHistory[currentOpId].push({ from:'op', text, ts:now, extracted:null });
  renderRight(currentOpId);
  setTimeout(() => {
    const reply = extractReply(text, opShiftState[currentOpId]||{}, now);
    if (reply.shiftOn !== undefined) { opShiftState[currentOpId].shiftOn = reply.shiftOn; delete reply.shiftOn; }
    opHistory[currentOpId].push(reply);
    renderRight(currentOpId);
    renderLeft();
  }, 700);
}

function extractReply(text, state, now) {
  const t = text.toLowerCase();
  if(/начин|смену|смена/.test(t)) return{from:'sys',ts:now,cls:'sys',extracted:{Intent:'shift_start',Confidence:'97%'},text:`Смена открыта. Машина ${state.activeMachine||'?'} активна. Удачной смены!`,shiftOn:true};
  if(/конч|закон|завершил/.test(t)) return{from:'sys',ts:now,cls:'sys',extracted:{Intent:'shift_end',Confidence:'96%'},text:'Смена закрыта. Итоги рассчитаны.',shiftOn:false};
  if(/залил|топлив|солярк|заправ/.test(t)){const n=t.match(/\d+/),v=n?n[0]:'?';return{from:'sys',ts:now,cls:'sys',extracted:{Intent:'fuel_log',Volume:`${v}л`,Confidence:'93%'},text:`Записано: ${v}л топлива ✓`};}
  if(/наработ|часов/.test(t)){const n=t.match(/\d+/),h=n?n[0]:'?';return{from:'sys',ts:now,cls:'sys',extracted:{Intent:'hours_log',Hours:`${h}ч`,Confidence:'94%'},text:`Записано: ${h}ч наработки ✓`};}
  if(/пожар|горит/.test(t)) return{from:'sys',ts:now,cls:'sys e',extracted:{Intent:'issue_report',Severity:'critical',Confidence:'97%'},text:'КРИТИЧНО зафиксировано. Владелец уведомлён.'};
  if(/стучит|течь|масло|гидравл|неисправ|сломал|проблем/.test(t)) return{from:'sys',ts:now,cls:'sys w',extracted:{Intent:'issue_report',Severity:'warning',Confidence:'87%'},text:'Зафиксировано. Приоритет MEDIUM.'};
  if(/куб|рейс|тонн|вывезли/.test(t)){const n=t.match(/\d+/);return{from:'sys',ts:now,cls:'sys',extracted:{Intent:'production_log',Qty:n?n[0]:'?',Confidence:'90%'},text:'Выработка записана ✓'};}
  if(/запчаст|фильтр|нужн|замен/.test(t)) return{from:'sys',ts:now,cls:'sys',extracted:{Intent:'parts_request',Confidence:'89%'},text:'Запрос на запчасть зафиксирован.'};
  return{from:'sys',ts:now,cls:'sys',extracted:{Intent:'status_update',Confidence:'82%'},text:'Принято ✓'};
}

function toggleShift() {
  const state = opShiftState[currentOpId];
  const op = operators.find(o => o.id === currentOpId);
  if (!state) return;
  quickSend(state.shiftOn ? 'Смена закончена' : `Начинаю смену на ${op?.machines[0]?.reg_number||'?'}`);
}

function switchMachine(reg, el, opId) {
  opShiftState[opId].activeMachine = reg;
  const now = new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  opHistory[opId].push({from:'sys',ts:now,cls:'sys',text:`Переключено на ${reg}`,extracted:{Intent:'machine_switch',Machine:reg,Confidence:'99%'}});
  renderRight(opId);
}

init();
</script>

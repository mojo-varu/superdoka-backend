
<style>
*{box-sizing:border-box;margin:0;padding:0}
.scr{display:grid;grid-template-columns:200px 1fr;height:760px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-tertiary);font-family:var(--font-sans,system-ui)}
.bar{grid-column:1/-1;height:44px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 16px;gap:10px}
.bar-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.bar-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-tertiary)}
.bar-tag.warn{background:#FAEEDA;border-color:#BA7517;color:#633806}
.bar-tag.ok{background:#EAF3DE;border-color:#639922;color:#27500A}
.body{grid-column:1/-1;display:grid;grid-template-columns:200px 1fr;height:716px;overflow:hidden}
.left{background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden}
.nav-section{padding:10px 12px 4px;font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--color-text-tertiary);text-transform:uppercase}
.nav-item{padding:9px 12px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);display:flex;align-items:center;gap:8px;border-radius:0;transition:background .1s;border-left:2px solid transparent}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:#E6F1FB;border-left-color:#185FA5;color:#0C447C;font-weight:500}
.nav-count{margin-left:auto;font-size:11px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);padding:1px 6px;border-radius:10px;color:var(--color-text-tertiary)}
.nav-count.red{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.fleet-divider{height:0.5px;background:var(--color-border-tertiary);margin:4px 0}
.machine-nav{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;border-left:2px solid transparent}
.machine-nav:hover{background:var(--color-background-secondary)}
.machine-nav.active{background:#E6F1FB;border-left-color:#185FA5}
.mnav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-work{background:#639922}
.d-warn{background:#BA7517}
.d-idle{background:#B4B2A9}
.d-down{background:#E24B4A}
.mnav-reg{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.mnav-type{font-size:11px;color:var(--color-text-tertiary);flex:1}
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--color-background-primary)}
.view-header{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0;display:flex;align-items:center;gap:10px}
.view-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.view-sub{font-size:12px;color:var(--color-text-tertiary)}
.content{flex:1;overflow-y:auto;padding:0}
.log-row{padding:10px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:background .1s}
.log-row:hover{background:var(--color-background-secondary)}
.log-row.expanded{background:var(--color-background-secondary)}
.log-time{font-size:11px;color:var(--color-text-tertiary);min-width:38px;padding-top:2px;font-family:var(--font-mono,monospace)}
.log-op-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;margin-top:1px}
.log-body{flex:1;min-width:0}
.log-op-name{font-size:11px;color:var(--color-text-tertiary)}
.log-text{font-size:13px;color:var(--color-text-primary);margin-top:2px;line-height:1.4}
.log-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:400}
.tag-intent{background:#EEEDFE;color:#3C3489;border:0.5px solid #7F77DD}
.tag-fuel{background:#E6F1FB;color:#0C447C;border:0.5px solid #378ADD}
.tag-hours{background:#EAF3DE;color:#27500A;border:0.5px solid #639922}
.tag-issue{background:#FAEEDA;color:#633806;border:0.5px solid #BA7517}
.tag-crit{background:#FCEBEB;color:#A32D2D;border:0.5px solid #E24B4A}
.tag-parts{background:#EEEDFE;color:#3C3489;border:0.5px solid #7F77DD}
.tag-prod{background:#E1F5EE;color:#085041;border:0.5px solid #1D9E75}
.tag-conf{background:var(--color-background-secondary);color:var(--color-text-tertiary);border:0.5px solid var(--color-border-secondary)}
.tag-machine{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);font-weight:500}
.extracted-panel{padding:8px 12px;background:var(--color-background-tertiary);border-top:0.5px solid var(--color-border-tertiary);font-size:11px;display:none}
.expanded .extracted-panel{display:block}
.ep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.ep-cell{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:5px 8px}
.ep-label{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em}
.ep-value{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-top:2px}
.machine-view{flex:1;overflow-y:auto}
.intel-header{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:flex-start;gap:12px}
.intel-reg{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.intel-model{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.intel-op{font-size:12px;color:var(--color-text-tertiary);margin-top:1px}
.status-badge{font-size:11px;padding:3px 10px;border-radius:4px;margin-left:auto;font-weight:500}
.sb-work{background:#EAF3DE;color:#27500A;border:0.5px solid #639922}
.sb-warn{background:#FAEEDA;color:#633806;border:0.5px solid #BA7517}
.sb-idle{background:var(--color-background-secondary);color:var(--color-text-tertiary);border:0.5px solid var(--color-border-tertiary)}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:0.5px solid var(--color-border-tertiary)}
.metric-cell{padding:14px 16px;border-right:0.5px solid var(--color-border-tertiary)}
.metric-cell:last-child{border-right:none}
.m-label{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em}
.m-value{font-size:22px;font-weight:500;color:var(--color-text-primary);margin-top:4px;line-height:1}
.m-unit{font-size:13px;color:var(--color-text-tertiary);font-weight:400}
.m-delta{font-size:11px;margin-top:3px;color:var(--color-text-tertiary)}
.m-delta.good{color:#3B6D11}
.m-delta.bad{color:#A32D2D}
.intel-sections{padding:0 16px}
.intel-section-title{font-size:11px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--color-text-tertiary);padding:12px 0 6px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:8px}
.open-issue{padding:10px;background:var(--color-background-secondary);border-radius:6px;margin-bottom:6px;border-left:3px solid #BA7517;border-top-left-radius:0;border-bottom-left-radius:0}
.issue-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.issue-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.issue-orig{font-size:12px;color:var(--color-text-secondary);margin-top:4px;font-style:italic}
.machine-log-row{padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:10px;align-items:flex-start}
.ml-time{font-size:10px;color:var(--color-text-tertiary);min-width:38px;font-family:var(--font-mono,monospace);padding-top:2px}
.ml-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
.ml-text{font-size:12px;color:var(--color-text-primary);flex:1}
.ml-extracted{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
</style>

<div class="scr">
  <div class="bar">
    <span class="bar-title">Logbuk</span>
    <span class="bar-tag">Owner view</span>
    <div style="margin-left:auto;display:flex;gap:6px">
      <span id="issue-badge" class="bar-tag warn">1 open issue</span>
      <span id="shift-badge" class="bar-tag ok">3 shifts active</span>
    </div>
  </div>

  <div class="body">
    <div class="left">
      <div class="nav-section">Activity</div>
      <div class="nav-item" id="nav-log" onclick="setView('log',this)">
        <span>Event log</span>
        <span class="nav-count" id="log-count">…</span>
      </div>
      <div id="fleet-nav">
        <div style="padding:12px;font-size:12px;color:var(--color-text-tertiary)">Loading fleet…</div>
      </div>
    </div>

    <div class="right" id="right"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api/v1';
const DOT = { working:'d-work', warning:'d-warn', down:'d-down', idle:'d-idle', maintenance:'d-idle' };
const INTENT_TAG = { fuel_log:'tag-fuel', hours_log:'tag-hours', issue_report:'tag-issue', parts_request:'tag-parts', production_log:'tag-prod', shift_start:'tag-intent', shift_end:'tag-intent', status_update:'tag-intent' };

let expandedRows = new Set();
let cachedEvents = null;

async function init() {
  let summary;
  try {
    summary = await fetch(`${API}/owner/fleet/summary`).then(r => r.json());
  } catch(e) {
    document.getElementById('fleet-nav').innerHTML = '<div style="padding:12px;font-size:12px;color:var(--color-text-tertiary)">Failed to load fleet</div>';
    return;
  }
  document.getElementById('issue-badge').textContent = `${summary.open_issues} open ${summary.open_issues===1?'issue':'issues'}`;
  document.getElementById('shift-badge').textContent = `${summary.active_shifts} shifts active`;
  document.getElementById('fleet-nav').innerHTML =
    `<div class="fleet-divider"></div><div class="nav-section">Fleet</div>` +
    summary.machines.map(m =>
      `<div class="machine-nav" id="nav-${m.reg_number}" onclick="setView('machine','${m.reg_number}',this)">
        <span class="mnav-dot ${DOT[m.status]||'d-idle'}"></span>
        <div style="flex:1;min-width:0"><div class="mnav-reg">${m.reg_number}</div><div class="mnav-type">${m.machine_type}</div></div>
      </div>`
    ).join('');
  document.getElementById('nav-log').classList.add('active');
  await renderLog();
}

async function setView(type, arg, el) {
  document.querySelectorAll('.nav-item,.machine-nav').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  if (type==='log') await renderLog();
  else await renderMachine(arg);
}

async function renderLog() {
  const r = document.getElementById('right');
  if (!cachedEvents) {
    r.innerHTML = `<div class="view-header"><div><div class="view-title">Event log</div><div class="view-sub">Loading…</div></div></div>`;
    try {
      cachedEvents = await fetch(`${API}/logs/events`).then(r => r.json());
    } catch(e) {
      r.innerHTML = `<div style="padding:20px;font-size:13px;color:var(--color-text-tertiary)">Failed to load events</div>`;
      return;
    }
  }
  document.getElementById('log-count').textContent = cachedEvents.length;
  const rows = cachedEvents.map((l,i) => {
    const tagHtml = l.tags.map(t => {
      const cls = INTENT_TAG[t] || (t==='warning'||t==='critical'?'tag-crit':'tag-machine');
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');
    const epCells = Object.entries(l.extracted).map(([k,v]) =>
      `<div class="ep-cell"><div class="ep-label">${k}</div><div class="ep-value">${v}</div></div>`
    ).join('');
    const expanded = expandedRows.has(i)?'expanded':'';
    const border = l.severity==='crit'?'border-left:3px solid #E24B4A':l.severity==='warn'?'border-left:3px solid #BA7517':'';
    return `<div class="log-row ${expanded}" style="${border}" onclick="toggleRow(${i})">
      <span class="log-time">${l.time}</span>
      <div class="log-op-av ${l.operator_av_class}" style="width:24px;height:24px;font-size:9px">${l.operator_initials}</div>
      <div class="log-body">
        <div class="log-op-name">${l.operator_name} · ${l.machine_reg}</div>
        <div class="log-text">${l.raw_text}</div>
        <div class="log-tags">${tagHtml}</div>
        <div class="extracted-panel">
          <div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.08em">Extracted data points</div>
          <div class="ep-grid">${epCells}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  r.innerHTML = `
    <div class="view-header"><div>
      <div class="view-title">Event log</div>
      <div class="view-sub">${cachedEvents.length} messages · today · all operators · click any row to expand</div>
    </div></div>
    <div class="content">${rows}</div>`;
}

function toggleRow(i) {
  expandedRows.has(i) ? expandedRows.delete(i) : expandedRows.add(i);
  renderLog();
}

async function renderMachine(reg) {
  const r = document.getElementById('right');
  r.innerHTML = `<div class="machine-view"><div class="intel-header"><div><div class="intel-reg">${reg}</div><div class="intel-model" style="color:var(--color-text-tertiary)">Loading…</div></div></div></div>`;
  let m;
  try {
    m = await fetch(`${API}/owner/fleet/${reg}`).then(r => r.json());
  } catch(e) {
    r.innerHTML = `<div style="padding:20px;font-size:13px;color:var(--color-text-tertiary)">Failed to load machine data</div>`;
    return;
  }
  const mt = m.metrics;
  const issuesHtml = m.open_issues.length===0
    ? '<div style="font-size:12px;color:var(--color-text-tertiary);padding:8px 0">No open issues</div>'
    : m.open_issues.map(i=>`<div class="open-issue"><div class="issue-title">${i.title}</div><div class="issue-meta">${i.meta}</div><div class="issue-orig">${i.original}</div></div>`).join('');
  const logHtml = m.timeline.length===0
    ? '<div style="font-size:12px;color:var(--color-text-tertiary);padding:8px 0">No activity today</div>'
    : m.timeline.map(e=>`<div class="machine-log-row"><span class="ml-time">${e.time}</span><span class="ml-dot ${e.dot_class}"></span><div><div class="ml-text">${e.raw_text||e.event_type}</div><div class="ml-extracted">${e.extracted}</div></div></div>`).join('');
  r.innerHTML = `
    <div class="machine-view">
      <div class="intel-header">
        <div>
          <div class="intel-reg">${m.reg_number}</div>
          <div class="intel-model">${m.model}</div>
          <div class="intel-op">${m.active_operator_name?'Operator: '+m.active_operator_name:'No active operator'}</div>
        </div>
        <span class="status-badge ${m.status_class}">${m.status}</span>
      </div>
      <div class="metrics-grid">
        <div class="metric-cell">
          <div class="m-label">Fuel today</div>
          <div class="m-value">${mt.fuel_today}<span class="m-unit">л</span></div>
          <div class="m-delta ${mt.fuel_rate>30?'bad':'good'}">${mt.fuel_rate} л/ч ${mt.fuel_rate>30?'· anomaly':'· normal'}</div>
        </div>
        <div class="metric-cell">
          <div class="m-label">Hours today</div>
          <div class="m-value">${mt.hours_today}<span class="m-unit">ч</span></div>
          <div class="m-delta good">on track</div>
        </div>
        <div class="metric-cell">
          <div class="m-label">Production</div>
          <div class="m-value">${mt.production_today}<span class="m-unit">${mt.production_today>0?'куб':''}</span></div>
          <div class="m-delta" style="color:var(--color-text-tertiary)">${mt.production_today>0?'logged':'not logged'}</div>
        </div>
        <div class="metric-cell">
          <div class="m-label">Open issues</div>
          <div class="m-value" style="${mt.open_issues>0?'color:#A32D2D':''}">${mt.open_issues}</div>
          <div class="m-delta ${mt.open_issues>0?'bad':'good'}">${mt.open_issues>0?'action needed':'clear'}</div>
        </div>
      </div>
      <div class="intel-sections">
        <div class="intel-section-title">Open issues</div>${issuesHtml}
        <div class="intel-section-title">Today's event log</div>${logHtml}
      </div>
    </div>`;
}

init();
</script>

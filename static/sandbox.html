<style>
/* Neobrutalism tokens ‚ÄĒ industrial palette */
:root {
  --nb-bg: #e8e4dc;
  --nb-bg-alt: #f1ede4;
  --nb-paper: #fafaf7;
  --nb-ink: #14171a;
  --nb-ink-soft: #2a2e33;
  --nb-muted: #6a6e73;

  --nb-border: 2px solid #14171a;
  --nb-border-thick: 3px solid #14171a;

  --nb-radius: 6px;
  --nb-radius-sm: 4px;

  --nb-shadow-sm: 3px 3px 0 0 #14171a;
  --nb-shadow: 5px 5px 0 0 #14171a;
  --nb-shadow-lg: 7px 7px 0 0 #14171a;

  --nb-lime: #d4c43a;
  --nb-yellow: #e8a93a;
  --nb-sky: #5b8aa8;
  --nb-coral: #b84a3a;
  --nb-violet: #6b6f8c;
  --nb-mint: #6b8e6e;
  --nb-pink: #b08770;
  --nb-orange: #c97a3a;

  --nb-good: #5a7a3a;
  --nb-warn: #c97a1a;
  --nb-bad: #a3331f;

  --nb-font: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  --nb-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--nb-font); color: var(--nb-ink); background: var(--nb-bg); -webkit-font-smoothing: antialiased; }

.nb-card { background: var(--nb-paper); border: var(--nb-border); border-radius: var(--nb-radius); box-shadow: var(--nb-shadow); }
.nb-flat { background: var(--nb-paper); border: var(--nb-border); border-radius: var(--nb-radius); }

.nb-btn {
  font-family: var(--nb-font); font-weight: 600; font-size: 12px; letter-spacing: 0.01em;
  background: var(--nb-paper); color: var(--nb-ink); border: var(--nb-border);
  border-radius: var(--nb-radius-sm); padding: 7px 12px; cursor: pointer;
  box-shadow: var(--nb-shadow-sm); transition: transform .06s ease, box-shadow .06s ease; white-space: nowrap;
}
.nb-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 #0a0a0a; }
.nb-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 #0a0a0a; }
.nb-btn.lime { background: var(--nb-lime); }
.nb-btn.sky { background: var(--nb-sky); color: #fafaf7; }
.nb-btn.coral { background: var(--nb-coral); color: #fafaf7; }
.nb-btn.yellow { background: var(--nb-yellow); }
.nb-btn.violet { background: var(--nb-violet); color: #fafaf7; }
.nb-btn.mint { background: var(--nb-mint); color: #fafaf7; }
.nb-btn.ink { background: var(--nb-ink); color: #fff; }

.nb-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--nb-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
  padding: 2px 7px; border: 1.5px solid var(--nb-ink); border-radius: 999px;
  background: var(--nb-paper); text-transform: lowercase;
}
.nb-tag.lime { background: var(--nb-lime); }
.nb-tag.sky { background: var(--nb-sky); color: #fafaf7; }
.nb-tag.coral { background: var(--nb-coral); color: #fafaf7; }
.nb-tag.yellow { background: var(--nb-yellow); }
.nb-tag.violet { background: var(--nb-violet); color: #fafaf7; }
.nb-tag.mint { background: var(--nb-mint); color: #fafaf7; }
.nb-tag.pink { background: var(--nb-pink); }
.nb-tag.ink { background: var(--nb-ink); color: #fff; border-color: var(--nb-ink); }

.nb-input {
  font-family: var(--nb-font); font-size: 13px; padding: 9px 12px;
  background: var(--nb-paper); border: var(--nb-border); border-radius: var(--nb-radius-sm);
  outline: none; color: var(--nb-ink); box-shadow: inset 2px 2px 0 0 rgba(0,0,0,0.04);
}
.nb-input:focus { box-shadow: var(--nb-shadow-sm); }

.nb-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.nb-scroll::-webkit-scrollbar-track { background: transparent; }
.nb-scroll::-webkit-scrollbar-thumb { background: var(--nb-ink); border: 2px solid var(--nb-bg); border-radius: 10px; }

.nb-label { font-family: var(--nb-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--nb-ink-soft); }

#app-root { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* Header nav CTA buttons */
.nb-view-btn {
  font-family: var(--nb-font); font-weight: 800; font-size: 14px; letter-spacing: 0.01em;
  padding: 11px 24px; border: 2px solid rgba(255,255,255,0.55); border-radius: var(--nb-radius-sm);
  cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 8px;
  transition: transform .06s ease, box-shadow .06s ease;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
  box-shadow: 3px 3px 0 0 rgba(255,255,255,0.2);
}
.nb-view-btn.active { background: var(--nb-yellow); color: var(--nb-ink); border-color: #fff; box-shadow: 3px 3px 0 0 rgba(255,255,255,0.4); }
.nb-view-btn:not(.active):hover { background: rgba(255,255,255,0.12); color: #fff; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 rgba(255,255,255,0.3); }
.nb-view-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 var(--nb-ink); }

/* Language toggle */
.nb-lang-btn {
  font-family: var(--nb-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.08em;
  padding: 5px 10px; border: 2px solid rgba(255,255,255,0.5); border-radius: var(--nb-radius-sm);
  cursor: pointer; background: transparent; color: rgba(255,255,255,0.55);
  transition: all .1s; white-space: nowrap;
}
.nb-lang-btn.active { background: var(--nb-paper); color: var(--nb-ink); border-color: #fff; box-shadow: 2px 2px 0 0 rgba(255,255,255,0.4); }
.nb-lang-btn:not(.active):hover { background: rgba(255,255,255,0.12); color: #fff; }

/* Inline nav badge buttons inside HowTo cards */
.nb-inline-nav {
  transition: transform .07s ease, box-shadow .07s ease;
}
.nb-inline-nav:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 var(--nb-ink) !important; }
.nb-inline-nav:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 var(--nb-ink) !important; }

/* ‚ĒÄ‚ĒÄ‚ĒÄ Responsive ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
@media (max-width: 900px) {
  .nb-summary-grid { grid-template-columns: 1fr !important; gap: 14px !important; padding: 14px !important; }
}

@media (max-width: 768px) {
  /* Header: 2-row layout, denser */
  .nb-header { height: auto !important; flex-wrap: wrap; padding: 8px 12px 4px !important; gap: 6px !important; }
  .nb-header-brand { flex: 1; min-width: 0; }
  .nb-header-brand .nb-vfm-pill { display: none !important; }
  .nb-header-nav { order: 3; width: 100%; display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .nb-header-nav::-webkit-scrollbar { display: none; }
  .nb-view-btn { font-size: 12px !important; padding: 8px 12px !important; flex-shrink: 0;
    box-shadow: 2px 2px 0 0 rgba(255,255,255,0.2) !important; }

  /* KPI strip: 2√ó2 wrap, tighter */
  .nb-kpi-strip { flex-wrap: wrap !important; }
  .nb-kpi-block { flex: 1 1 48% !important; border-right: none !important;
    border-bottom: 2px solid var(--nb-ink) !important; padding: 12px 14px !important; }
  .nb-kpi-block:nth-child(odd) { border-right: 2px solid var(--nb-ink) !important; }
  .nb-kpi-block:nth-last-child(-n+2) { border-bottom: none !important; }
  .nb-kpi-block .nb-label { font-size: 9px !important; letter-spacing: .08em !important; }
  .nb-kpi-block > div:nth-child(2) > span:first-child { font-size: 22px !important; }
  .nb-kpi-block > div:nth-child(2) > span:nth-child(2) { font-size: 11px !important; }
  .nb-kpi-block > div:last-child { font-size: 9.5px !important; }

  /* Tab bar: horizontally scrollable */
  .nb-tab-bar { overflow-x: auto !important; -webkit-overflow-scrolling: touch;
    padding: 8px 12px !important; gap: 6px !important; }
  .nb-tab-bar::-webkit-scrollbar { display: none; }
  .nb-tab-bar button { flex-shrink: 0 !important; font-size: 12px !important;
    padding: 7px 12px !important; }

  /* Dialogs: full-width on small screens */
  .nb-dialog { width: 96vw !important; max-height: 88vh !important; }

  /* Summary tab: stack two columns + smaller cards */
  .nb-summary-grid { grid-template-columns: 1fr !important; gap: 14px !important; padding: 14px !important; }

  /* Howto cards: tighter padding on mobile */
  .howto-page { padding: 14px !important; gap: 12px !important; }
  .howto-page > div:first-child > div { font-size: 19px !important; line-height: 1.25 !important; }
  .howto-card-body { padding: 16px 16px 12px !important; gap: 16px !important; }
  .howto-card-body div[style*="font-size:17px"], .howto-card-body span[style*="font-size:17px"] { font-size: 14px !important; line-height: 1.55 !important; }
  .howto-card-header { padding: 10px 14px !important; }
  .howto-card-header span:last-child { font-size: 16px !important; }
  .howto-grid { grid-template-columns: 1fr !important; gap: 14px !important; }

  /* Operator/Fleet sidebar ‚Üí horizontal scroll row on mobile */
  .mobile-sidebar-row { max-height: none !important; overflow: hidden !important; }
  .mobile-sidebar-row > .nb-scroll { display: flex !important; flex-direction: row !important;
    overflow-x: auto !important; overflow-y: hidden !important; -webkit-overflow-scrolling: touch;
    flex: 0 0 auto !important; }
  .mobile-sidebar-row > .nb-scroll > div { flex: 0 0 auto !important; border-bottom: none !important;
    border-right: 2px solid var(--nb-ink) !important; min-width: 180px; max-width: 230px; }
  .mobile-sidebar-row > .nb-scroll > div:last-child { border-right: none !important; }

  /* Operator chat panel cleanup */
  .operator-shell { padding: 10px !important; gap: 10px !important; }
  .operator-quicklog { padding: 8px 12px !important; gap: 6px !important; }
  .operator-quicklog .nb-btn { font-size: 11px !important; padding: 6px 9px !important; }
  .operator-quicklog .nb-label { font-size: 9px !important; }
  .operator-header { padding: 12px 14px !important; gap: 8px !important; }
  .operator-header-name { font-size: 16px !important; }
  .operator-input-bar { padding: 10px 12px !important; gap: 8px !important; }
  .operator-input-bar .nb-input { font-size: 14px !important; padding: 9px 11px !important; }
  .operator-input-bar .nb-btn { padding: 9px 14px !important; }

  /* Bubbles wider */
  .bubble-op { max-width: 88% !important; }
  .bubble-sys { max-width: 90% !important; }

  /* Fleet detail header */
  .fleet-detail-header { padding: 14px 16px !important; gap: 10px !important; }
  .fleet-detail-reg { font-size: 26px !important; }
  .fleet-detail-model { font-size: 11px !important; white-space: normal !important; }
  .fleet-detail-op { font-size: 12px !important; white-space: normal !important; }

  /* Log card text tighter */
  .log-card-text { font-size: 13px !important; }
  .log-card-time { min-width: 36px !important; font-size: 10px !important; }

  /* Operator console: CSS-driven grid + sidebar cap */
  .operator-grid { grid-template-columns: 1fr !important; grid-template-rows: auto 1fr !important; }
  .operator-sidebar { max-height: 220px !important; border-right: none !important;
    border-bottom: var(--nb-border-thick) !important; }

  /* Fleet/Operators grids: single column */
  .nb-fleet-grid { grid-template-columns: 1fr !important; }
  .nb-operators-grid { grid-template-columns: 1fr !important; }
}

@media (max-width: 480px) {
  .nb-view-btn { font-size: 11px !important; padding: 7px 10px !important; }
  .nb-kpi-block { flex: 1 1 100% !important; border-right: none !important; }
  .nb-kpi-block:nth-child(odd) { border-right: none !important; }
  .nb-kpi-block:nth-last-child(-n+2) { border-bottom: 2px solid var(--nb-ink) !important; }
  .nb-kpi-block:last-child { border-bottom: none !important; }

  /* Header tighter */
  .nb-header-brand > div:nth-child(2) { font-size: 14px !important; }
  .nb-header > div:nth-child(2) { gap: 6px !important; }
  .nb-header > div:nth-child(2) > div:last-child { width: 28px !important; height: 28px !important; }
  .nb-lang-btn { font-size: 10px !important; padding: 4px 8px !important; }

  /* Op header flex-wrap */
  .operator-header { flex-wrap: wrap !important; }
  .operator-header > div:first-child { flex-wrap: wrap !important; }
  .operator-header .nb-btn { font-size: 11px !important; padding: 7px 10px !important; }

  /* Fleet detail */
  .fleet-detail-header { border-left-width: 6px !important; }
  .fleet-detail-reg { font-size: 22px !important; }

  /* Nav: icon-only on very small screens */
  .nb-view-btn .nb-view-btn-label { display: none; }
  .nb-view-btn { padding: 8px 10px !important; }

  /* Sample messages: bottom sheet */
  .nb-samples-dialog { width: 100vw !important; max-width: 100vw !important;
    border-radius: 12px 12px 0 0 !important; border-left: none !important;
    border-right: none !important; border-bottom: none !important;
    position: fixed !important; bottom: 0 !important; top: auto !important;
    max-height: 80vh !important; overflow-y: auto !important; }
  .nb-samples-overlay { align-items: flex-end !important; padding: 0 !important; }
}

@keyframes nb-shake {
  0%, 70%, 100% { transform: translate(0, 0) rotate(0deg); }
  72%  { transform: translate(-3px, 0) rotate(-1.5deg); }
  74%  { transform: translate(3px, 0) rotate(1.5deg); }
  76%  { transform: translate(-3px, 0) rotate(-1.5deg); }
  78%  { transform: translate(3px, 0) rotate(1.5deg); }
  80%  { transform: translate(-2px, 0) rotate(0deg); }
  82%  { transform: translate(2px, 0) rotate(0deg); }
  84%  { transform: translate(0, 0) rotate(0deg); }
}

.nb-shake {
  animation: nb-shake 4s ease-in-out infinite;
  display: inline-block;
}

@keyframes nb-stamp {
  0%, 60%, 100% { transform: scale(1);     box-shadow: 3px 3px 0 0 #14171a; }
  65%            { transform: scale(0.93);  box-shadow: 1px 1px 0 0 #14171a; }
  72%            { transform: scale(1.04);  box-shadow: 5px 5px 0 0 #14171a; }
  80%            { transform: scale(0.98);  box-shadow: 3px 3px 0 0 #14171a; }
  88%            { transform: scale(1);     box-shadow: 3px 3px 0 0 #14171a; }
}

.nb-stamp {
  animation: nb-stamp 3.5s ease-in-out infinite;
  display: inline-block;
  transform-origin: center;
}
</style>

      border:"2px solid var(--nb-ink)", borderRadius:4, letterSpacing:".06em" }}>{s.label}</span>
  );
}

function Avatar2({ initials, color, size=28 }) {
  return (
    <div style={{ width:size, height:size, borderRadius:"50%", background:color,
      border:"2px solid var(--nb-ink)", display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"var(--nb-mono)", fontWeight:700, fontSize:size*0.34, flexShrink:0, color:"var(--nb-ink)" }}>{initials}</div>
  );
}

function MetricBlock({ label, value, unit, sub, subTone, accent }) {
  const subColor = { good:"#0a7d2c", bad:"#a8201a", muted:"var(--nb-muted)" }[subTone || "muted"];
  return (
    <div className="nb-kpi-block" style={{ padding:"16px 18px", background:accent||"var(--nb-paper)", borderRight:"2px solid var(--nb-ink)", flex:1, minWidth:0 }}>
      <div className="nb-label">{label}</div>
      <div style={{ display:"flex", alignItems:"baseline", gap:4, marginTop:6 }}>
        <span style={{ fontSize:30, fontWeight:800, lineHeight:1, letterSpacing:"-.02em" }}>{value}</span>
        {unit && <span style={{ fontFamily:"var(--nb-mono)", fontSize:13, fontWeight:600, color:"var(--nb-ink-soft)" }}>{unit}</span>}
      </div>
      {sub && <div style={{ fontFamily:"var(--nb-mono)", fontSize:10.5, fontWeight:600, color:subColor, marginTop:6, textTransform:"uppercase", letterSpacing:".05em" }}>{sub}</div>}
    </div>
  );
}

function SummaryTab({ fleetData, events }) {
  const { t, lang } = useLangT();
  const [openIssues, setOpenIssues] = React.useState([]);

  React.useEffect(() => {
    if (!fleetData) return;
    const withIssues = (fleetData.machines || []).filter(m => m.open_issues > 0);
    if (!withIssues.length) { setOpenIssues([]); return; }
    Promise.all(withIssues.map(m =>
      fetch(`/api/v1/vfm/machine/${encodeURIComponent(m.reg_number)}/state`)
        .then(r => r.ok ? r.json() : null).catch(() => null)
    )).then(results => {
      const all = [];
      results.forEach(r => {
        if (r?.open_issues) r.open_issues.forEach(iss =>
          all.push({ ...iss, machine: r.machine.reg_number })
        );
      });
      setOpenIssues(all);
    });
  }, [fleetData]);

  const machines      = fleetData?.machines || [];
  const summary       = fleetData?.summary  || {};
  const totalMachines = summary.total_machines    ?? machines.length;
  const activeShifts  = summary.active_shifts     ?? 0;
  const issueCount    = summary.total_open_issues ?? 0;
  const anomalyCount  = summary.total_anomalies   ?? 0;
  const hoursTotal    = machines.reduce((s, m) => s + (m.hours_today || 0), 0);
  const fuelTotal     = machines.reduce((s, m) => s + (m.fuel_today  || 0), 0);
  const anomalies     = machines.filter(m => m.anomaly);
  const loading       = !fleetData;
  const feed          = [...events].reverse();

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      <div className="nb-kpi-strip" style={{ display:"flex", borderBottom:"var(--nb-border-thick)", background:"var(--nb-paper)" }}>
        <MetricBlock
          label={t('kpi_fleet_uptime')}
          value={loading ? "‚Ä¶" : `${activeShifts}/${totalMachines}`}
          sub={loading ? "" : `${totalMachines - activeShifts} ${lang === 'ru' ? '–Ĺ–Ķ –Ĺ–į —Ā–ľ–Ķ–Ĺ–Ķ' : 'off shift'}`}
          subTone="muted"
        />
        <MetricBlock
          label={t('kpi_hours')}
          value={loading ? "‚Ä¶" : Math.round(hoursTotal * 10) / 10}
          unit={loading ? "" : "h"}
          sub={loading ? "" : t('kpi_ops_sub')}
          subTone="muted"
        />
        <MetricBlock
          label={t('kpi_fuel')}
          value={loading ? "‚Ä¶" : Math.round(fuelTotal)}
          unit={loading ? "" : "L"}
          sub={loading ? "" : anomalyCount > 0
            ? `‚Ė≤ ${anomalyCount} ${lang === 'ru' ? '–į–Ĺ–ĺ–ľ–į–Ľ–ł–Ļ' : 'anomalies'}`
            : (lang === 'ru' ? '‚ÜĒ –Ĺ–ĺ—Ä–ľ–į' : '‚ÜĒ normal')}
          subTone={anomalyCount > 0 ? "bad" : "good"}
        />
        <MetricBlock
          label={t('kpi_open_issues')}
          value={loading ? "‚Ä¶" : issueCount}
          sub={loading ? "" : issueCount > 0
            ? (lang === 'ru' ? '—ā—Ä–Ķ–Ī—É–Ķ—ā –≤–Ĺ–ł–ľ–į–Ĺ–ł—Ź' : 'needs attention')
            : (lang === 'ru' ? '–≤—Ā—Ď —á–ł—Ā—ā–ĺ' : 'all clear')}
          subTone={issueCount > 0 ? "bad" : "good"}
          accent={issueCount > 0 ? "var(--nb-yellow)" : "var(--nb-paper)"}
        />
      </div>

      <div className="nb-scroll nb-summary-grid" style={{ flex:1, overflowY:"auto", padding:18, display:"grid", gridTemplateColumns:"1.3fr 1fr", gap:18, alignContent:"start" }}>
        {/* VFM Insights ‚ÄĒ anomalies only */}
        <div style={{ gridColumn:"1 / -1" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
            <div style={{ background:"var(--nb-ink)", color:"#fff", fontFamily:"var(--nb-mono)", fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:4, letterSpacing:".08em" }}>{t('vfm_badge')}</div>
            <span style={{ fontFamily:"var(--nb-mono)", fontSize:11, color:"var(--nb-muted)" }}>
              {anomalies.length > 0
                ? (lang === 'ru' ? `${anomalies.length} –į–Ĺ–ĺ–ľ–į–Ľ–ł–Ļ –Ņ–ĺ –ī–į–Ĺ–Ĺ—č–ľ —Ą–Ľ–ĺ—ā–į` : `${anomalies.length} anomalies from fleet data`)
                : (lang === 'ru' ? '–į–Ĺ–ĺ–ľ–į–Ľ–ł–Ļ –Ĺ–Ķ—ā' : 'no anomalies')}
            </span>
          </div>
          {anomalies.length === 0 ? (
            <div className="nb-flat" style={{ padding:"14px 18px", fontFamily:"var(--nb-mono)", fontSize:12, color:"var(--nb-muted)" }}>
              {lang === 'ru'
                ? '–í—Ā–Ķ –ľ–į—ą–ł–Ĺ—č —Ä–į–Ī–ĺ—ā–į—é—ā –≤ —ą—ā–į—ā–Ĺ–ĺ–ľ —Ä–Ķ–∂–ł–ľ–Ķ ‚ÄĒ –į–Ĺ–ĺ–ľ–į–Ľ–ł–Ļ —Ä–į—Ā—Ö–ĺ–ī–į —ā–ĺ–Ņ–Ľ–ł–≤–į –Ĺ–Ķ –ĺ–Ī–Ĺ–į—Ä—É–∂–Ķ–Ĺ–ĺ.'
                : 'All machines within normal parameters ‚ÄĒ no fuel rate anomalies detected.'}
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))", gap:14 }}>
              {anomalies.map((m, i) => {
                const pct = (m.fuel_rate && m.fuel_baseline)
                  ? Math.round((m.fuel_rate / m.fuel_baseline - 1) * 100)
                  : null;
                return (
                  <div key={i} className="nb-card" style={{ padding:14, background:"var(--nb-yellow)" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                      <div style={{ width:26, height:26, background:"var(--nb-ink)", color:"#fff", border:"2px solid var(--nb-ink)", borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800 }}>‚Ė≤</div>
                      <span className="nb-tag ink">{lang === 'ru' ? '–į–Ĺ–ĺ–ľ–į–Ľ–ł—Ź' : 'anomaly'}</span>
                      <span style={{ fontFamily:"var(--nb-mono)", fontSize:12, fontWeight:800, marginLeft:"auto" }}>{m.alias || m.reg_number}</span>
                    </div>
                    <div style={{ fontSize:14, fontWeight:700, lineHeight:1.25, marginBottom:6 }}>
                      {lang === 'ru'
                        ? `–†–į—Ā—Ö–ĺ–ī —ā–ĺ–Ņ–Ľ–ł–≤–į ${m.fuel_rate} –Ľ/—á${pct !== null ? ` ‚ÄĒ +${pct}% –ļ –Ī–į–∑–ĺ–≤–ĺ–ľ—É` : ''}`
                        : `Fuel rate ${m.fuel_rate} L/h${pct !== null ? ` ‚ÄĒ +${pct}% above baseline` : ''}`}
                    </div>
                    <div style={{ fontSize:12, lineHeight:1.45, color:"var(--nb-ink-soft)" }}>
                      {lang === 'ru'
                        ? `–Ď–į–∑–ĺ–≤—č–Ļ: ${m.fuel_baseline ?? '‚ÄĒ'} –Ľ/—á. –í–ĺ–∑–ľ–ĺ–∂–Ķ–Ĺ —Ö–ĺ–Ľ–ĺ—Ā—ā–ĺ–Ļ —Ö–ĺ–ī, —É—ā–Ķ—á–ļ–į –ł–Ľ–ł –Ņ—Ä–ł–≤—č—á–ļ–į –ĺ–Ņ–Ķ—Ä–į—ā–ĺ—Ä–į.`
                        : `Baseline: ${m.fuel_baseline ?? '‚ÄĒ'} L/h. Possible idling, leak, or operator habit.`}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Open issues */}
        <div>
          <div className="nb-label" style={{ marginBottom:8 }}>{t('kpi_open_issues')}</div>
          {openIssues.length === 0 ? (
            <div className="nb-flat" style={{ padding:14, fontFamily:"var(--nb-mono)", fontSize:12, color:"var(--nb-muted)" }}>
              {lang === 'ru' ? '–ě—ā–ļ—Ä—č—ā—č—Ö –Ņ—Ä–ĺ–Ī–Ľ–Ķ–ľ –Ĺ–Ķ—ā' : 'No open issues'}
            </div>
          ) : openIssues.map((iss, i) => (
            <div key={i} className="nb-card" style={{ padding:14, marginBottom:10, background:"var(--nb-yellow)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <span className="nb-tag ink">{iss.priority || 'MEDIUM'}</span>
                <span style={{ fontFamily:"var(--nb-mono)", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>{iss.machine}</span>
                <span style={{ fontFamily:"var(--nb-mono)", fontSize:10.5, color:"var(--nb-ink-soft)", marginLeft:"auto", whiteSpace:"nowrap" }}>
                  {new Date(iss.created_at).toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' })}
                </span>
              </div>
              <div style={{ fontSize:14, fontWeight:700, lineHeight:1.3 }}>{iss.description}</div>
              {(iss.component || iss.severity) && (
                <div style={{ fontFamily:"var(--nb-mono)", fontSize:11, color:"var(--nb-ink-soft)", marginTop:4 }}>
                  {[iss.component && `${lang === 'ru' ? '—É–∑–Ķ–Ľ' : 'component'}: ${iss.component}`, iss.severity && `${lang === 'ru' ? '—Ā–Ķ—Ä—Ć—Ď–∑–Ĺ–ĺ—Ā—ā—Ć' : 'severity'}: ${iss.severity}`].filter(Boolean).join(' ¬∑ ')}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Activity feed */}
        <div>
          <div className="nb-label" style={{ marginBottom:8 }}>{t('todays_activity')}</div>
          {feed.length === 0 ? (
            <div className="nb-card" style={{ padding:20, textAlign:"center", fontFamily:"var(--nb-mono)", fontSize:12, color:"var(--nb-muted)" }}>
              {lang === 'ru' ? '–Ě–Ķ—ā –į–ļ—ā–ł–≤–Ĺ–ĺ—Ā—ā–ł —Ā–Ķ–≥–ĺ–ī–Ĺ—Ź' : 'No activity today'}
            </div>
          ) : (
            <div className="nb-card" style={{ padding:0, overflow:"hidden" }}>
              {feed.slice(0, 7).map((ev, i) => (
                <div key={ev.id || i} style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"9px 12px", borderBottom:i<Math.min(feed.length,7)-1?"1.5px solid var(--nb-ink)":"none", background:ev.severity==="warn"||ev.severity==="crit"?"var(--nb-yellow)":"var(--nb-paper)" }}>
                  <span style={{ fontFamily:"var(--nb-mono)", fontSize:10.5, fontWeight:700, minWidth:36 }}>{ev.time}</span>
                  <Avatar2 initials={ev.operator_initials || "?"} color="var(--nb-bg-alt)" size={22} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12.5, lineHeight:1.3 }}>{ev.raw_text}</div>
                    <div style={{ fontFamily:"var(--nb-mono)", fontSize:10, color:"var(--nb-muted)", marginTop:2 }}>{ev.operator_name} ¬∑ {ev.machine_reg}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const INTENT_META = {
  fuel_log:       { color:"sky",    ru:"–Ę–ĺ–Ņ–Ľ–ł–≤–ĺ",      en:"Fuel" },
  hours_log:      { color:"mint",   ru:"–Ě–į—Ä–į–Ī–ĺ—ā–ļ–į",    en:"Hours" },
  issue_report:   { color:"yellow", ru:"–ü—Ä–ĺ–Ī–Ľ–Ķ–ľ–į",     en:"Issue" },
  shift_start:    { color:"lime",   ru:"–Ě–į—á–į–Ľ–ĺ —Ā–ľ–Ķ–Ĺ—č", en:"Shift start" },
  shift_end:      { color:"lime",   ru:"–ö–ĺ–Ĺ–Ķ—Ü —Ā–ľ–Ķ–Ĺ—č",  en:"Shift end" },
  production_log: { color:"violet", ru:"–í—č—Ä–į–Ī–ĺ—ā–ļ–į",    en:"Production" },
  parts_request:  { color:"pink",   ru:"–ó–į–Ņ—á–į—Ā—ā–ł",     en:"Parts" },
  correction:     { color:"coral",  ru:"–ö–ĺ—Ä—Ä–Ķ–ļ—Ü–ł—Ź",    en:"Correction" },
  status_update:  { color:"violet", ru:"–°—ā–į—ā—É—Ā",       en:"Status" },
};

function intentLabel(intent, lang) {
  const m = INTENT_META[intent];
  if (!m) return intent;
  return lang === 'ru' ? m.ru : m.en;
}

function MachineLogsTab({ events }) {
  const { t, lang } = useLangT();
  const [expanded, setExpanded] = React.useState(new Set());
  const [filter, setFilter] = React.useState("all");

  const feed = React.useMemo(() => [...events].reverse(), [events]);
  const filters = ["all", "fuel_log", "hours_log", "issue_report", "shift_start", "shift_end", "production_log", "parts_request"];
  const visible = filter === "all" ? feed : feed.filter(ev => ev.intent === filter);
  const toggle = id => {
    const next = new Set(expanded);
    next.has(id) ? next.delete(id) : next.add(id);
    setExpanded(next);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", padding:"12px 18px", borderBottom:"2px solid var(--nb-ink)", background:"var(--nb-bg-alt)" }}>
        <span className="nb-label">{t('filter_label')}</span>
        {filters.map(f => (
          <button key={f} className="nb-btn"
            style={{ background:filter===f?"var(--nb-yellow)":"var(--nb-paper)", boxShadow:filter===f?"var(--nb-shadow-sm)":"none" }}
            onClick={() => setFilter(f)}>
            {f === "all" ? "all" : intentLabel(f, lang)}
          </button>
        ))}
        <span style={{ marginLeft:"auto", fontFamily:"var(--nb-mono)", fontSize:11, color:"var(--nb-muted)" }}>
          {t('msgs_count', visible.length, feed.length)}
        </span>
      </div>
      <div className="nb-scroll" style={{ flex:1, overflowY:"auto", padding:18 }}>
        {visible.length === 0 ? (
          <div style={{ textAlign:"center", padding:40, fontFamily:"var(--nb-mono)", fontSize:12, color:"var(--nb-muted)" }}>
            {lang === 'ru' ? '–Ě–Ķ—ā –∑–į–Ņ–ł—Ā–Ķ–Ļ –∑–į —Ā–Ķ–≥–ĺ–ī–Ĺ—Ź' : 'No entries today'}
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {visible.map((ev) => {
              const isExp = expanded.has(ev.id);
              const conf = ev.confidence != null ? `${Math.round(ev.confidence * 100)}%` : '‚ÄĒ';
              const tagColor = INTENT_META[ev.intent]?.color || "violet";
              return (
                <div key={ev.id} onClick={() => toggle(ev.id)} className="nb-card"
                  style={{ padding:0, background:ev.severity==="warn"||ev.severity==="crit"?"var(--nb-yellow)":"var(--nb-paper)", cursor:"pointer" }}>
                  <div style={{ display:"flex", gap:12, alignItems:"flex-start", padding:"12px 14px" }}>
                    <span style={{ fontFamily:"var(--nb-mono)", fontSize:11, fontWeight:700, minWidth:42, paddingTop:2 }}>{ev.time}</span>
                    <Avatar2 initials={ev.operator_initials || "?"} color="var(--nb-bg-alt)" size={30} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                        <span style={{ fontWeight:700, fontSize:12.5, whiteSpace:"nowrap" }}>{ev.operator_name}</span>
                        <span style={{ fontFamily:"var(--nb-mono)", fontSize:11, color:"var(--nb-muted)" }}>¬∑</span>
                        <span style={{ fontFamily:"var(--nb-mono)", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>{ev.machine_reg}</span>
                      </div>
                      <div style={{ fontSize:14, lineHeight:1.4, marginBottom:6 }}>{ev.raw_text}</div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                        <span className={`nb-tag ${tagColor}`}>{intentLabel(ev.intent, lang)}</span>
                        {(ev.tags || []).slice(1).map((tag, j) => (
                          <span key={j} className="nb-tag ink">{tag}</span>
                        ))}
                      </div>
                    </div>
                    <span style={{ fontFamily:"var(--nb-mono)", fontSize:10, fontWeight:700, background:"var(--nb-ink)", color:"#fff", padding:"3px 8px", borderRadius:4, flexShrink:0 }}>{conf}</span>
                  </div>
                  {isExp && (
                    <div style={{ borderTop:"2px solid var(--nb-ink)", background:"var(--nb-bg-alt)", padding:"10px 14px" }}>
                      <div className="nb-label" style={{ marginBottom:6 }}>{t('extracted_header')}</div>
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:8 }}>
                        {Object.entries(ev.extracted || {}).map(([k, v]) => (
                          <div key={k} style={{ background:"var(--nb-paper)", border:"2px solid var(--nb-ink)", borderRadius:4, padding:"6px 10px" }}>
                            <div style={{ fontFamily:"var(--nb-mono)", fontSize:9.5, color:"var(--nb-muted)", textTransform:"uppercase", letterSpacing:".08em" }}>{k}</div>
                            <div style={{ fontSize:13, fontWeight:700, marginTop:2 }}>{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function FleetTab({ fleetData }) {
  const { t, lang } = useLangT();
  const isMobile = window.__useWindowWidth() < 768;
  const machines = fleetData?.machines || [];
  const [selected, setSelected] = React.useState(null);
  const [detail, setDetail] = React.useState(null);

  React.useEffect(() => {
    if (!selected && machines.length > 0) setSelected(machines[0].reg_number);
  }, [machines.length]);

  React.useEffect(() => {
    if (!selected) return;
    setDetail(null);
    fetch(`/api/v1/owner/fleet/${encodeURIComponent(selected)}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) setDetail(d); })
      .catch(() => {});
  }, [selected]);

  if (!fleetData) {
    return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100%", fontFamily:"var(--nb-mono)", fontSize:12, color:"var(--nb-muted)" }}>
        {lang === 'ru' ? '–ó–į–≥—Ä—É–∑–ļ–į –ī–į–Ĺ–Ĺ—č—Ö —Ą–Ľ–ĺ—ā–į‚Ä¶' : 'Loading fleet data‚Ä¶'}
      </div>
    );
  }

  return (
    <div className="nb-fleet-grid" style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : "300px 1fr", gridTemplateRows: isMobile ? "auto 1fr" : "1fr", height:"100%", overflow: isMobile ? "auto" : "hidden" }}>
      <div className={isMobile ? "mobile-sidebar-row" : ""} style={{ background:"var(--nb-bg-alt)", borderRight: isMobile ? "none" : "2px solid var(--nb-ink)", borderBottom: isMobile ? "2px solid var(--nb-ink)" : "none", display:"flex", flexDirection:"column", overflow:"hidden", maxHeight: isMobile ? 200 : "none" }}>
        <div style={{ padding:"12px 14px", borderBottom:"2px solid var(--nb-ink)", background:"var(--nb-paper)" }}>
          <div className="nb-label">{lang === 'ru' ? `–ú–ĺ–Ļ —Ą–Ľ–ĺ—ā ¬∑ ${machines.length} –ľ–į—ą–ł–Ĺ` : `My Fleet ¬∑ ${machines.length} machines`}</div>
        </div>
        <div className="nb-scroll" style={{ overflowY:"auto", flex:1 }}>
          {machines.map((mm) => (
            <div key={mm.reg_number} onClick={() => setSelected(mm.reg_number)}
              style={{ padding:"12px 14px", cursor:"pointer", background:selected===mm.reg_number?"var(--nb-yellow)":"transparent", borderBottom:"2px solid var(--nb-ink)", display:"flex", flexDirection:"column", gap:4 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontFamily:"var(--nb-mono)", fontSize:13, fontWeight:800, letterSpacing:".02em", whiteSpace:"nowrap" }}>{mm.alias || mm.reg_number}</span>
                <span style={{ marginLeft:"auto", flexShrink:0 }}><StatusPill status={(mm.status || 'idle').toLowerCase()} /></span>
              </div>
              <div style={{ fontSize:12, color:"var(--nb-ink-soft)" }}>{mm.type}</div>
              <div style={{ fontFamily:"var(--nb-mono)", fontSize:10.5, color:"var(--nb-muted)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {mm.shift_active
                  ? (lang === 'ru' ? '—Ā–ľ–Ķ–Ĺ–į –į–ļ—ā–ł–≤–Ĺ–į' : 'shift active')
                  : t('no_operator')}
                {mm.open_issues > 0 && ` ¬∑ ${mm.open_issues} ${lang === 'ru' ? '–Ņ—Ä–ĺ–Ī–Ľ–Ķ–ľ' : 'issues'}`}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="nb-scroll" style={{ overflowY:"auto" }}>
        {!detail ? (
          <div style={{ padding:40, fontFamily:"var(--nb-mono)", fontSize:12, color:"var(--nb-muted)" }}>
            {lang === 'ru' ? '–ó–į–≥—Ä—É–∑–ļ–į‚Ä¶' : 'Loading‚Ä¶'}
          </div>
        ) : (
          <>
            <div className="fleet-detail-header" style={{ padding:"20px 22px", borderBottom:"var(--nb-border-thick)", background:"var(--nb-bg-alt)", borderLeft:"8px solid var(--nb-yellow)", display:"flex", alignItems:"flex-start", gap:16 }}>

function FleetIntelligence({ active, onSummaryUpdate }) {
  const { t } = useLangT();
  const [tab, setTab] = React.useState(() => {
    try { return localStorage.getItem('vfm_active_tab') || "summary"; } catch { return "summary"; }
  });
  const [fleetData, setFleetData] = React.useState(null);
  const [events, setEvents] = React.useState([]);

  const fetchAll = React.useCallback(async () => {
    try {
      const [fi, ev] = await Promise.all([
        fetch('/api/v1/vfm/fleet/intelligence').then(r => r.ok ? r.json() : null),
        fetch('/api/v1/logs/events?limit=50').then(r => r.ok ? r.json() : []),
      ]);
      if (fi) { setFleetData(fi); if (onSummaryUpdate) onSummaryUpdate(fi.summary || {}); }
      if (Array.isArray(ev)) setEvents(ev);
    } catch (_) {}
  }, []);

  React.useEffect(() => {
    if (!active) return;
    fetchAll();
    const pollId = setInterval(fetchAll, 30000);
    return () => clearInterval(pollId);
  }, [active, fetchAll]);

  const tabs = [
    { id:"summary",   label:t('tab_summary'),   icon:"‚Ė£" },
    { id:"logs",      label:t('tab_logs'),       icon:"‚Č°", count:events.length || undefined },
    { id:"fleet",     label:t('tab_fleet'),      icon:"‚óę", count:fleetData?.machines?.length || undefined },
    { id:"operators", label:t('tab_operators'),  icon:"‚óé" },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      <div className="nb-tab-bar" style={{ display:"flex", padding:"12px 22px", background:"var(--nb-bg)", borderBottom:"var(--nb-border-thick)", alignItems:"center", gap:8, flexShrink:0 }}>
        {tabs.map(tb => {
          const isActive = tb.id === tab;
          return (
            <button key={tb.id} onClick={() => { setTab(tb.id); try { localStorage.setItem('vfm_active_tab', tb.id); } catch {} }} style={{
              fontFamily:"var(--nb-font)", fontWeight:700, fontSize:13,
              padding:"8px 18px", background:isActive?"var(--nb-yellow)":"var(--nb-paper)",
              color:"var(--nb-ink)", border:"2px solid var(--nb-ink)", borderRadius:"var(--nb-radius-sm)",
              cursor:"pointer", boxShadow:isActive?"var(--nb-shadow-sm)":"2px 2px 0 0 var(--nb-ink)",
              display:"flex", alignItems:"center", gap:7,
              transition:"background .1s, box-shadow .06s, transform .06s",
              transform:isActive?"translate(-1px,-1px)":"none",
            }}>
              <span style={{ fontSize:14 }}>{tb.icon}</span>
              {tb.label}
              {tb.count && <span style={{ fontFamily:"var(--nb-mono)", fontSize:10, fontWeight:700, padding:"1px 6px", background:isActive?"var(--nb-ink)":"var(--nb-bg-alt)", color:isActive?"#fff":"var(--nb-ink)", borderRadius:999, border:"1.5px solid var(--nb-ink)" }}>{tb.count}</span>}
            </button>
          );
        })}
      </div>

      <div style={{ flex:1, overflow:"hidden" }}>
        {tab === "summary"   && <SummaryTab fleetData={fleetData} events={events} />}
        {tab === "logs"      && <MachineLogsTab events={events} />}
        {tab === "fleet"     && <FleetTab fleetData={fleetData} />}
        {tab === "operators" && <OperatorsTab fleetData={fleetData} events={events} />}
      </div>
    </div>
  );
}

  <script type="text/babel">

function useLangT2() {
  const { lang } = window.__useLang();
  const T = window.__T[lang];
  const t = (key, ...args) => { const v = T[key]; return typeof v === 'function' ? v(...args) : (v ?? key); };
  return { t, lang };
}

const INTENT_DISPLAY = {
  fuel_log:       { ru:'–Ę–ĺ–Ņ–Ľ–ł–≤–ĺ',      en:'Fuel' },
  hours_log:      { ru:'–Ě–į—Ä–į–Ī–ĺ—ā–ļ–į',    en:'Hours' },
  issue_report:   { ru:'–ü—Ä–ĺ–Ī–Ľ–Ķ–ľ–į',     en:'Issue' },
  shift_start:    { ru:'–Ě–į—á–į–Ľ–ĺ —Ā–ľ–Ķ–Ĺ—č', en:'Shift start' },
  shift_end:      { ru:'–ö–ĺ–Ĺ–Ķ—Ü —Ā–ľ–Ķ–Ĺ—č',  en:'Shift end' },
  off_topic:      { ru:'–Ě–Ķ –Ņ–ĺ —ā–Ķ–ľ–Ķ',   en:'Off-topic' },
  clarification:  { ru:'–£—ā–ĺ—á–Ĺ–Ķ–Ĺ–ł–Ķ',    en:'Clarification' },
  production_log: { ru:'–í—č—Ä–į–Ī–ĺ—ā–ļ–į',    en:'Production' },
  parts_request:  { ru:'–ó–į–Ņ—á–į—Ā—ā–ł',     en:'Parts' },
  unknown:        { ru:'‚ÄĒ',            en:'‚ÄĒ' },
};

function displayIntent(intent, lang) {
  const m = INTENT_DISPLAY[intent];
  return m ? (lang === 'ru' ? m.ru : m.en) : intent;
}

function syntheticReply(ev) {
  const c = ev.content || {};
  switch (ev.event_type) {
    case 'shift_start':
      return { text:`–°–ľ–Ķ–Ĺ–į –ĺ—ā–ļ—Ä—č—ā–į. –ú–į—ą–ł–Ĺ–į ${ev.machine_reg} –į–ļ—ā–ł–≤–Ĺ–į. –£–ī–į—á–Ĺ–ĺ–Ļ —Ā–ľ–Ķ–Ĺ—č!`, tone:'ok' };
    case 'shift_end':
      return { text:'–°–ľ–Ķ–Ĺ–į –∑–į–ļ—Ä—č—ā–į. –ė—ā–ĺ–≥–ł –∑–į—Ą–ł–ļ—Ā–ł—Ä–ĺ–≤–į–Ĺ—č.', tone:'ok' };
    case 'fuel_log': {
      const vol = c.fuel_volume ?? c.liters ?? c.volume ?? '?';
      return { text:`–ó–į–Ņ–ł—Ā–į–Ĺ–ĺ: ${vol} –Ľ —ā–ĺ–Ņ–Ľ–ł–≤–į.`, tone:'ok' };
    }
    case 'hours_log': {
      const hrs = c.hours ?? '?';
      return { text:`–ó–į–Ņ–ł—Ā–į–Ĺ–ĺ: ${hrs} —á –Ĺ–į—Ä–į–Ī–ĺ—ā–ļ–ł.`, tone:'ok' };
    }
    case 'issue_report':
      return { text:'–ó–į—Ą–ł–ļ—Ā–ł—Ä–ĺ–≤–į–Ĺ–ĺ. –ü—Ä–ł–ĺ—Ä–ł—ā–Ķ—ā MEDIUM. –£—ā–ĺ—á–Ĺ–ł—ā–Ķ –ī–Ķ—ā–į–Ľ–ł.', tone:'warn' };
    case 'parts_request':
      return { text:'–ó–į–Ņ—Ä–ĺ—Ā –Ĺ–į –∑–į–Ņ—á–į—Ā—ā—Ć –∑–į—Ą–ł–ļ—Ā–ł—Ä–ĺ–≤–į–Ĺ.', tone:'ok' };
    case 'production_log':
      return { text:'–í—č—Ä–į–Ī–ĺ—ā–ļ–į –∑–į–Ņ–ł—Ā–į–Ĺ–į.', tone:'ok' };
    case 'correction':
      return { text:'–ö–ĺ—Ä—Ä–Ķ–ļ—Ü–ł—Ź –Ņ—Ä–ł–Ĺ—Ź—ā–į.', tone:'ok' };
    default:
      return { text:'–ü—Ä–ł–Ĺ—Ź—ā–ĺ.', tone:'ok' };
  }
}

function classifyReply(text, T) {
  const t = text.toLowerCase();
  if (/–Ĺ–į—á–ł–Ĺ|—Ā–ľ–Ķ–Ĺ|start|shift/.test(t))
    return { tone:"ok", text:T.reply_shift_start, ext:{ intent:"shift_start" } };
  if (/–ļ–ĺ–Ĺ—á|–∑–į–ļ–ĺ–Ĺ|–∑–į–≤–Ķ—Ä—ą|ended|finish/.test(t))
    return { tone:"ok", text:T.reply_shift_end, ext:{ intent:"shift_end" } };
  if (/–∑–į–Ľ–ł–Ľ|—ā–ĺ–Ņ–Ľ–ł–≤|—Ā–ĺ–Ľ—Ź—Ä–ļ|–∑–į–Ņ—Ä–į–≤|fuel|litr/.test(t)) {
    const n = t.match(/\d+/); const v = n ? n[0] : "?";
    return { tone:"ok", text:T.reply_fuel(v), ext:{ intent:"fuel_log" } };
  }
  if (/–Ĺ–į—Ä–į–Ī–ĺ—ā|—á–į—Ā–ĺ–≤|hours|engine/.test(t)) {
    const n = t.match(/\d+/); const h = n ? n[0] : "?";
    return { tone:"ok", text:T.reply_hours(h), ext:{ intent:"hours_log" } };
  }
  if (/–Ņ–ĺ–∂–į—Ä|–≥–ĺ—Ä–ł—ā|fire/.test(t))
    return { tone:"bad", text:T.reply_critical, ext:{ intent:"issue_report" } };
  if (/—Ā—ā—É—á–ł—ā|—ā–Ķ—á—Ć|–ľ–į—Ā–Ľ–ĺ|–≥–ł–ī—Ä–į–≤–Ľ|–Ĺ–Ķ–ł—Ā–Ņ—Ä–į–≤|—Ā–Ľ–ĺ–ľ–į–Ľ|–Ņ—Ä–ĺ–Ī–Ľ–Ķ–ľ|knock|leak|hydraul/.test(t))
    return { tone:"warn", text:T.reply_issue, ext:{ intent:"issue_report" } };
  if (/–∑–į–Ņ—á–į—Ā—ā|—Ą–ł–Ľ—Ć—ā—Ä|–Ĺ—É–∂–Ĺ|–∑–į–ľ–Ķ–Ĺ|filter|need|part/.test(t))
    return { tone:"ok", text:T.reply_parts, ext:{ intent:"parts_request" } };
  return { tone:"ok", text:T.reply_default, ext:{ intent:"unknown" } };
}

        {msg.ext && (
          <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:6, paddingTop:6,
            borderTop:`1.5px dashed ${msg.tone === 'ok' ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.2)'}` }}>
            <span className="nb-tag ink">{displayIntent(msg.ext.intent, lang)}</span>
            {msg.ext.conf && <span className="nb-tag ink">conf {msg.ext.conf}</span>}
          </div>
        )}
      </div>
    </div>
  );
}

function MachinePill({ m }) {
  const isActive = m.is_session_machine;
  let bg = "var(--nb-paper)";
  if (isActive && m.status === "warning") bg = "var(--nb-coral)";
  else if (isActive) bg = "var(--nb-yellow)";
  return (
    <span style={{ fontFamily:"var(--nb-mono)", fontSize:11, fontWeight:700, padding:"4px 10px",
      background:bg, border:"2px solid var(--nb-ink)", borderRadius:4,
      boxShadow:isActive?"2px 2px 0 0 var(--nb-ink)":"none", letterSpacing:".02em" }}>{m.reg_number}</span>
  );
}

function SampleChip({ msg, color, onClick }) {
  const [flash, setFlash] = React.useState(false);
  const handle = () => { setFlash(true); setTimeout(() => setFlash(false), 500); onClick(); };
  return (
    <div onClick={handle} style={{
      fontFamily:"var(--nb-mono)", fontSize:12.5, padding:"7px 13px",
      background: flash ? "var(--nb-lime)" : (color || "var(--nb-bg-alt)"),
      border:"2px solid var(--nb-ink)", borderRadius:4, cursor:"pointer",
      transition:"background .12s", userSelect:"none", lineHeight:1.4,
    }}>
      {msg}
    </div>
  );
}

function OperatorSandbox() {
  const { t, lang } = useLangT2();
  const isMobile = window.__useWindowWidth() < 768;
  const [operators, setOperators] = React.useState([]);
  const [currentOpId, setCurrentOpId] = React.useState(() => {
    const saved = localStorage.getItem('sandbox_op_id');
    return saved ? parseInt(saved, 10) : null;
  });
  const selectOp = (id) => {
    localStorage.setItem('sandbox_op_id', String(id));
    setCurrentOpId(id);
  };
  const [history, setHistory] = React.useState([]);
  const [draft, setDraft] = React.useState("");
  const [apiLoading, setApiLoading] = React.useState(false);
  const [opsLoading, setOpsLoading] = React.useState(true);
  const [showSamples, setShowSamples] = React.useState(false);
  const [samplesAnimPaused, setSamplesAnimPaused] = React.useState(false);
  const msgsRef = React.useRef(null);
  const lastEventIdRef = React.useRef(0);
  const pollRef = React.useRef(null);
  const TL = window.__T[lang];

  const currentOp = operators.find(o => o.id === currentOpId) || null;

  // Load operator list on mount
  React.useEffect(() => {
    fetch('/api/v1/operator/list')
      .then(r => r.ok ? r.json() : [])
      .then(data => {
        const ops = Array.isArray(data) ? data : [];
        setOperators(ops);
        if (ops.length > 0) {
          const saved = parseInt(localStorage.getItem('sandbox_op_id'), 10);
          const valid = ops.find(o => o.id === saved);
          selectOp(valid ? saved : ops[0].id);
        }
        setOpsLoading(false);
      })
      .catch(() => setOpsLoading(false));
  }, []);

  // Convert conversation log entries ‚Üí bubble pairs
  const eventsToHistory = (events) => {
    const bubbles = [];
    events.forEach(ev => {
      const ts = ev.created_at
        ? new Date(ev.created_at).toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" })
        : '';
      bubbles.push({ key:`op-${ev.id}`, from:'op', text:ev.raw_text || '', ts });
      if (ev.vfm_reply) {
        const conf = ev.confidence != null && ev.confidence >= 0.70
          ? `${Math.round(ev.confidence * 100)}%` : null;
        const tone = ev.intent === 'issue_report' ? 'warn' : 'ok';
        bubbles.push({
          key:`sys-${ev.id}`, from:'sys', tone,
          text: ev.vfm_reply, ts,
          ext:{ intent: ev.intent || 'unknown', conf },
        });
      }
    });
    return bubbles;
  };

  // Load + poll timeline when operator changes
  React.useEffect(() => {
    if (!currentOpId) return;
    setHistory([]);
    lastEventIdRef.current = 0;
    if (pollRef.current) clearInterval(pollRef.current);

    const fetchTimeline = () =>
      fetch(`/api/v1/operator/${currentOpId}/conversation?limit=50`)
        .then(r => r.ok ? r.json() : []).catch(() => []);

    fetchTimeline().then(events => {
      if (events.length > 0) lastEventIdRef.current = events[events.length - 1].id;
      setHistory(eventsToHistory(events));
    });

    pollRef.current = setInterval(() => {
      fetchTimeline().then(events => {
        const fresh = events.filter(e => e.id > lastEventIdRef.current);
        if (fresh.length > 0) {
          lastEventIdRef.current = fresh[fresh.length - 1].id;
          setHistory(prev => [...prev, ...eventsToHistory(fresh)]);
        }
      });
    }, 15000);

    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, [currentOpId]);

  // Auto-scroll
  React.useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [history.length, currentOpId, apiLoading]);

  const send = async (textArg) => {
    const text = (textArg ?? draft).trim();
    if (!text || apiLoading || !currentOp) return;
    if (!currentOp.platform_user_id) {
      setDraft("");
      return;
    }
    const now = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
    const snapOpId = currentOp.id;
    setDraft("");

    // Optimistic operator bubble
    const opKey = `op-live-${Date.now()}`;
    setHistory(prev => [...prev, { key:opKey, from:'op', text, ts:now }]);
    setApiLoading(true);

    try {
      const res = await fetch('/api/v1/vfm/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          operator_id: String(currentOp.platform_user_id),
          chat_id: 'sandbox',
          text,
          source: 'sandbox',
          modality: 'text',
        }),
      });
      const data = await res.json();
      const replyTs = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });

      // Skip this entry in the 15s poll so we don't show it twice
      const skipId = data.conversation_log_id ?? data.timeline_event_id;
      if (skipId) {
        lastEventIdRef.current = Math.max(lastEventIdRef.current, skipId);
      }

      const tone = data.errors?.length > 0 ? 'warn'
        : data.intent === 'issue_report' ? 'warn'
        : data.confidence_route === 'CONFIRM' ? 'warn'
        : 'ok';
      const conf = data.confidence != null && data.confidence >= 0.70
        ? `${Math.round(data.confidence * 100)}%` : null;

      setHistory(prev => [...prev, {
        key:`sys-live-${Date.now()}`, from:'sys', tone,
        text: data.reply || TL.reply_default,
        ts: replyTs,
        ext: { intent: data.intent || 'unknown', conf },
      }]);

      // Reflect shift change locally
      if (data.intent === 'shift_start' || data.intent === 'shift_end') {
        setOperators(prev => prev.map(o =>
          o.id === snapOpId ? { ...o, is_on_shift: data.intent === 'shift_start' } : o
        ));
      }
    } catch (_) {
      const fallback = classifyReply(text, TL);
      const replyTs = new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
      setHistory(prev => [...prev, {
        key:`sys-err-${Date.now()}`, from:'sys', tone:fallback.tone,
        text:fallback.text, ts:replyTs, ext:fallback.ext,
      }]);
    } finally {
      setApiLoading(false);
    }
  };

  const toggleShift = () => {
    if (!currentOp) return;
    if (currentOp.is_on_shift) {
      send("–°–ľ–Ķ–Ĺ–į –∑–į–ļ–ĺ–Ĺ—á–Ķ–Ĺ–į");
    } else {
      const machines = currentOp.machines || [];
      if (machines.length === 1) {
        send(`–Ĺ–į—á–ł–Ĺ–į—é —Ā–ľ–Ķ–Ĺ—É –Ĺ–į ${machines[0].reg_number}`);
      } else if (machines.length > 1) {
        setDraft("–Ĺ–į—á–ł–Ĺ–į—é —Ā–ľ–Ķ–Ĺ—É –Ĺ–į ");
        setTimeout(() => {
          document.querySelector('.operator-input-bar .nb-input')?.focus();
        }, 50);
      } else {
        setDraft("–Ĺ–į—á–ł–Ĺ–į—é —Ā–ľ–Ķ–Ĺ—É –Ĺ–į ");

  // Quick buttons ‚ÄĒ pre-fill input with editable template, don't send
  const quickButtons = lang === 'ru'

    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100%",

    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden", background:"#cdc8be" }}>
      <div className="operator-shell operator-grid" style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : "300px 1fr", gridTemplateRows: isMobile ? "auto 1fr" : "1fr", flex:1, minHeight:0, gap: isMobile ? 12 : 20, padding: isMobile ? "14px 4%" : "32px 5%", background:"#cdc8be" }}>

        {/* Operator list */}
        <div className={`operator-sidebar${isMobile ? " mobile-sidebar-row" : ""}`} style={{ background:"var(--nb-bg-alt)", border:"var(--nb-border)", borderRadius:"var(--nb-radius)", boxShadow:"var(--nb-shadow)", display:"flex", flexDirection:"column", overflow:"hidden", maxHeight: isMobile ? 220 : "none" }}>
